// Supabase table name mapping
const SB_TABLES = {
  znn_customers:"znn_customers", znn_products:"znn_products",
  znn_proformas:"znn_proformas", znn_siparisler:"znn_siparisler",
  znn_personel:"znn_personel", znn_projeler:"znn_projeler",

// Simple keys stored only locally
const LOCAL_ONLY = ["znn_apikey","znn_sb_config","znn_settings_brand","znn_settings_social","znn_katalog_settings","znn_lang","znn_ios_hint"];

async function sbFetch(path, opts={}) {
  const c = (() => { try { return JSON.parse(localStorage.getItem("znn_sb_config")||"{}"); } catch (e4) { return {}; } })();
  if(!c.url||!c.key) return null;
  try {
    const r = await fetch(c.url+"/rest/v1/"+path, {
      ...opts,
      headers: {
        "apikey": c.key,
        "Authorization": "Bearer "+c.key,
        "Content-Type": "application/json",
        "Prefer": opts.method==="POST"?"return=representation":"",
        ...(opts.headers||{})
      }
    });
    if(!r.ok) return null;
    const txt = await r.text();
    return txt ? JSON.parse(txt) : [];
  } catch(e) { return null; }
}

// Hybrid store: Supabase when connected, localStorage as fallback
const store = {
  get: (k) => {
    try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch (e5) { return null; }
  },
  set: (k, v) => {
    try {
      localStorage.setItem(k, JSON.stringify(v));
      // Async sync to Supabase for non-local keys
      if(!LOCAL_ONLY.includes(k) && sbEnabled() && SB_TABLES[k]) {
        store._syncToSB(k, v);
      }
    } catch (e6) {}
  },
  _syncToSB: async (k, data) => {
    const table = SB_TABLES[k];
    if(!table) return;
    try {
      // For user-type tables (arrays), we do upsert all rows
      if(Array.isArray(data)) {
        // Delete all + re-insert (simple approach)
        await sbFetch(table+"?id=gte.0", {method:"DELETE"});
        if(data.length > 0) {
          const rows = data.map(item => ({id: item.id||Date.now(), data: item}));
          await sbFetch(table, {method:"POST", body: JSON.stringify(rows)});
        }
      } else if(data && typeof data === 'object') {
        await sbFetch(table+"?key=eq."+k, {method:"DELETE"});
        await sbFetch(table, {method:"POST", body: JSON.stringify({key:k, value:data})});
      }
    } catch (e7) {}
  },
  loadFromSB: async (k) => {
    const table = SB_TABLES[k];
    if(!table || !sbEnabled()) return null;
    try {
      const rows = await sbFetch(table+"?order=id.asc");
      if(!rows || !rows.length) return null;
      // Return array of data objects
      const result = rows.map(r => r.data || r);
      localStorage.setItem(k, JSON.stringify(result));
      return result;
    } catch (e8) { return null; }
  },
  syncAll: async () => {
    if(!sbEnabled()) return false;
    const keys = Object.keys(SB_TABLES);
    for(const k of keys) {
      const data = await store.loadFromSB(k);
      if(data) localStorage.setItem(k, JSON.stringify(data));
    }
    return true;
  },
  push: async (tableKey, item) => {
    if(!sbEnabled()) return null;
    const table = SB_TABLES[tableKey];
    if(!table) return null;
    try {
      const row = {id: item.id||Math.floor(Date.now()+Math.random()*999), data: item};
      return await sbFetch(table+"?on_conflict=id", {
        method:"POST",
        headers:{"Prefer":"return=representation,resolution=merge-duplicates"},
        body:JSON.stringify(row)
      });
    } catch(e) { return null; }
  },
  remove: async (tableKey, id) => {
    if(!sbEnabled()) return;
    const table = SB_TABLES[tableKey];
    if(!table) return;
    try { await sbFetch(table+"?id=eq."+id, {method:"DELETE"}); } catch (e9) {}
  },
  autoSync: async () => {
    if(!sbEnabled()) return;
    // Load all data from Supabase on startup
    const keys = ["znn_customers","znn_products","znn_proformas","znn_siparisler","znn_personel","znn_giderler","znn_faturalar","znn_sikayetler","znn_hedefler","znn_notlar","znn_hatirlatici","znn_katalog_items","znn_teklifler"];
    for(const k of keys) {
      try {
        const data = await store.loadFromSB(k);
        if(data && data.length > 0) localStorage.setItem(k, JSON.stringify(data));
      } catch (e10) {}
    }
  }
};

// ─── SERVICE WORKER (offline cache) ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'zenniva-v1';
const ASSETS = [
  'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js',
];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).catch(()=>{}));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('anthropic.com')) return;
  e.respondWith(
    caches.match(e.request).then(cached => cached || fetch(e.request).then(resp => {
      if (resp && resp.status === 200 && e.request.method === 'GET') {
        const clone = resp.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
      }
      return resp;
    }).catch(() => cached))
  );
});
`;
  const blob = new Blob([swCode], {type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob))
    .then(() => console.log('Zenniva SW registered'))
    .catch(e => console.log('SW error:', e));
}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:"#7a5030"}}>✉️ E-posta Gönder</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#a09080"}}>✕</button>
        </div>
        <div style={{marginBottom:10}}>
          <span className="lbl">Alıcı E-posta</span>
          <input className="inp" value={form.to} onChange={e=>setForm(p=>({...p,to:e.target.value}))} placeholder="<a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="d4bba6bab1bf94b1b9b5bdb8fab7bbb9">[email&#160;protected]</a>"/>
        </div>
        <div style={{marginBottom:10}}>
          <span className="lbl">Konu</span>
          <input className="inp" value={form.subject} onChange={e=>setForm(p=>({...p,subject:e.target.value}))} placeholder="E-posta konusu"/>
        </div>
        <div style={{marginBottom:16}}>
          <span className="lbl">Mesaj</span>
          <textarea className="inp" value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))} rows={6} style={{resize:"vertical"}} placeholder="Mesajınızı yazın..."/>
        </div>
        {status==="ok" && <div style={{padding:"10px",background:"rgba(58,154,90,.1)",borderRadius:8,color:"#3a9a5a",marginBottom:12,textAlign:"center"}}>✅ E-posta gönderildi!</div>}
        {status==="error" && <div style={{padding:"10px",background:"rgba(192,64,64,.1)",borderRadius:8,color:"#c04040",marginBottom:12,textAlign:"center"}}>❌ Gönderilemedi. Ayarları kontrol edin.</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button className="bg" onClick={onClose}>İptal</button>
          <button className="bp" onClick={send} disabled={status==="sending"}>
            {status==="sending"?"⏳ Gönderiliyor...":status==="ok"?"✅ Gönderildi":"📤 Gönder"}
          </button>
        </div>
      </div>
    </div>
  );
}

</script>
</body>
</html>
