// Supabase bağlantısı - Settings > Veritabanı menüsünden girin
const SB_CONFIG = (() => {
  try {
    const cfg = localStorage.getItem("znn_sb_config");
    return cfg ? JSON.parse(cfg) : { url: "", key: "" };
  } catch { return { url: "", key: "" }; }
})();

const sbEnabled = () => {
  const c = (() => { try { return JSON.parse(localStorage.getItem("znn_sb_config")||"{}"); } catch { return {}; } })();
  return !!(c.url && c.key);
};

// Supabase table name mapping
const SB_TABLES = {
  znn_customers:"znn_customers", znn_products:"znn_products",
  znn_proformas:"znn_proformas", znn_siparisler:"znn_siparisler",
  znn_personel:"znn_personel", znn_projeler:"znn_projeler",
  znn_tedarkci:"znn_tedarkci", znn_hesaplar:"znn_hesaplar",
  znn_islemler:"znn_islemler", znn_giderler:"znn_giderler",

  znn_notlar:"znn_notlar", znn_hatirlatici:"znn_hatirlatici",
  znn_katalog_items:"znn_katalog_items", znn_ai_history:"znn_ai_history",
  znn_users:"znn_users", znn_teklifler:"znn_teklifler",
};

// Simple keys stored only locally
const LOCAL_ONLY = ["znn_apikey","znn_sb_config","znn_settings_brand","znn_settings_social","znn_katalog_settings","znn_lang","znn_ios_hint"];

async function sbFetch(path, opts={}) {
  const c = (() => { try { return JSON.parse(localStorage.getItem("znn_sb_config")||"{}"); } catch { return {}; } })();
  if(!c.url||!c.key) return null;
  try {
    const r = await fetch(c.url+"/rest/v1/"+path, {
      ...opts,
      headers: {
        "apikey": c.key,
        "Authorization": "Bearer "+c.key,
        "Content-Type": "application/json",
        "Prefer": opts.method==="POST"?"return=representation":"",
        ...(opts.headers||{})
      }
    });
    if(!r.ok) return null;
    const txt = await r.text();
    return txt ? JSON.parse(txt) : [];
  } catch(e) { return null; }
}

// Hybrid store: Supabase when connected, localStorage as fallback
const store = {
  get: (k) => {
    try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; }
  },
  set: (k, v) => {
    try {
      localStorage.setItem(k, JSON.stringify(v));
      // Async sync to Supabase for non-local keys
      if(!LOCAL_ONLY.includes(k) && sbEnabled() && SB_TABLES[k]) {
        store._syncToSB(k, v);
      }
    } catch {}
  },
  _syncToSB: async (k, data) => {
    const table = SB_TABLES[k];
    if(!table) return;
    try {
      // For user-type tables (arrays), we do upsert all rows
      if(Array.isArray(data)) {
        // Delete all + re-insert (simple approach)
        await sbFetch(table+"?id=gte.0", {method:"DELETE"});
        if(data.length > 0) {
          const rows = data.map(item => ({id: item.id||Date.now(), data: item}));
          await sbFetch(table, {method:"POST", body: JSON.stringify(rows)});
        }
      } else if(data && typeof data === 'object') {
        await sbFetch(table+"?key=eq."+k, {method:"DELETE"});
        await sbFetch(table, {method:"POST", body: JSON.stringify({key:k, value:data})});
      }
    } catch {}
  },
  loadFromSB: async (k) => {
    const table = SB_TABLES[k];
    if(!table || !sbEnabled()) return null;
    try {
      const rows = await sbFetch(table+"?order=id.asc");
      if(!rows || !rows.length) return null;
      // Return array of data objects
      const result = rows.map(r => r.data || r);
      localStorage.setItem(k, JSON.stringify(result));
      return result;
    } catch { return null; }
  },
  syncAll: async () => {
    if(!sbEnabled()) return false;
    const keys = Object.keys(SB_TABLES);
    for(const k of keys) {
      const data = await store.loadFromSB(k);
      if(data) localStorage.setItem(k, JSON.stringify(data));
    }
    return true;
  },
  push: async (tableKey, item) => {
    if(!sbEnabled()) return null;
    const table = SB_TABLES[tableKey];
    if(!table) return null;
    try {
      const row = {id: item.id||Math.floor(Date.now()+Math.random()*999), data: item};
      return await sbFetch(table+"?on_conflict=id", {
        method:"POST",
        headers:{"Prefer":"return=representation,resolution=merge-duplicates"},
        body:JSON.stringify(row)
      });
    } catch(e) { return null; }
  },
  remove: async (tableKey, id) => {
    if(!sbEnabled()) return;
    const table = SB_TABLES[tableKey];
    if(!table) return;
    try { await sbFetch(table+"?id=eq."+id, {method:"DELETE"}); } catch {}
  },
  autoSync: async () => {
    if(!sbEnabled()) return;
    // Load all data from Supabase on startup
    const keys = ["znn_customers","znn_products","znn_proformas","znn_siparisler","znn_personel","znn_giderler","znn_faturalar","znn_sikayetler","znn_hedefler","znn_notlar","znn_hatirlatici","znn_katalog_items","znn_teklifler"];
    for(const k of keys) {
      try {
        const data = await store.loadFromSB(k);
        if(data && data.length > 0) localStorage.setItem(k, JSON.stringify(data));
      } catch {}
    }
  }
};

const BarChart = ({ data, dataKey, color="#b8935a", height=120, showValue=false }) => {
  const max = Math.max(...data.map(d=>d[dataKey]),1);
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:5,height,padding:"4px 0"}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          {showValue && <span style={{fontSize:9,color:"#b0a090"}}>{fmtK(d[dataKey])}</span>}
          <div title={`${d.month}: ${d[dataKey]}`} style={{width:"100%",background:`linear-gradient(to top,${color},${color}88)`,height:`${Math.max((d[dataKey]/max)*(height-(showValue?36:20)),3)}px`,borderRadius:"3px 3px 0 0",transition:"height .4s ease",cursor:"pointer",boxShadow:`0 2px 8px ${color}22`}}/>
          <span style={{fontSize:9,color:"#b0a090"}}>{d.month}</span>
        </div>
      ))}
    </div>
  );
};

const LineChart = ({ data, dataKey, color="#5cb87a", height=80 }) => {
  const max = Math.max(...data.map(d=>d[dataKey]),1);
  const min = Math.min(...data.map(d=>d[dataKey]),0);
  const range = max-min||1;
  const w=300, h=height;
  const pts = data.map((d,i)=>({ x:(i/(data.length-1))*w, y:h-((d[dataKey]-min)/range)*(h-16)-8 }));
  const path = pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(" ");
  const area = `${path} L${pts[pts.length-1].x},${h} L0,${h} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{overflow:"visible"}}>
      <defs><linearGradient id={`lg${dataKey}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".2"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill={`url(#lg${dataKey})`}/>
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3" fill={color} stroke="#fff" strokeWidth="2"/>)}
    </svg>
  );
};

const DonutChart = ({ segments, size=96 }) => {
  const total = segments.reduce((s,x)=>s+x.value,0)||1;
  let cumul=0; const r=38, cx=50, cy=50;
  const paths = segments.map(seg=>{
    const start=(cumul/total)*2*Math.PI-Math.PI/2; cumul+=seg.value;
    const end=(cumul/total)*2*Math.PI-Math.PI/2;
    const x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
    const x2=cx+r*Math.cos(end),y2=cy+r*Math.sin(end);
    const large=end-start>Math.PI?1:0;
    return {d:`M${cx} ${cy} L${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2}Z`,color:seg.color};
  });
  return <svg width={size} height={size} viewBox="0 0 100 100">{paths.map((p,i)=><path key={i} d={p.d} fill={p.color} opacity=".85"/>)}<circle cx={cx} cy={cy} r={24} fill="#fff"/></svg>;
};

    if(sel?.id===proj.id) setSel(u.find(p=>p.id===proj.id));
  };
  const statusColor = s=>s==="Tamamlandı"?"#3a9a5a":s==="Devam Ediyor"?"#4a7ab0":s==="Beklemede"?"#b8935a":"#a09080";

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:300,color:"#7a5030"}}>Proje Takibi</div>
        <div style={{display:"flex",gap:8}}>
          {sel && <button className="bg" onClick={()=>setSel(null)}>← Geri</button>}
          {!sel && mode==="list" && <button className="bp" onClick={()=>setMode("new")}>+ Proje Ekle</button>}
          {mode==="new" && <button className="bg" onClick={()=>setMode("list")}>İptal</button>}
        </div>
      </div>
      {!sel && mode==="list" && <>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
          {[["Toplam Proje",list.length,"#a09080"],["Devam Eden",list.filter(p=>p.status==="Devam Ediyor").length,"#4a7ab0"],["Tamamlanan",list.filter(p=>p.status==="Tamamlandı").length,"#3a9a5a"],["Toplam Bütçe",fmt(list.reduce((s,p)=>s+p.budget,0)),"#b8935a"]].map(([l,v,c])=>(
            <div key={l} style={{background:"#fff",border:"1px solid #e8e2d8",borderRadius:9,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
              <div style={{fontSize:9.5,color:"#b0a090",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{l}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:c}}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr",gap:12}}>
          {list.map(p=>{
            const pct=Math.round((p.tasks.filter(t=>t.done).length/Math.max(p.tasks.length,1))*100);
            const budgetPct=Math.round((p.spent/Math.max(p.budget,1))*100);
            return (
              <div key={p.id} onClick={()=>setSel(p)} className="card" style={{cursor:"pointer"}}
                onMouseOver={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(184,147,90,.12)"}
                onMouseOut={e=>e.currentTarget.style.boxShadow="none"}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div>
                    <div style={{fontSize:14,color:"#3a2a18",fontWeight:500,marginBottom:3}}>{p.name}</div>
                    <div style={{fontSize:11,color:"#b0a090"}}>{p.client} · {p.startDate} → {p.endDate}</div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:`rgba(${p.priority==="Yüksek"?"192,64,64":"184,147,90"},.1)`,color:p.priority==="Yüksek"?"#c04040":"#b8935a",border:`1px solid rgba(${p.priority==="Yüksek"?"192,64,64":"184,147,90"},.25)`}}>{p.priority}</span>
                    <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:`rgba(${statusColor(p.status).replace("#","")},.08)`,color:statusColor(p.status),border:`1px solid ${statusColor(p.status)}33`}}>{p.status}</span>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                      <span style={{fontSize:10,color:"#b0a090"}}>Görev İlerlemesi</span>
                      <span style={{fontSize:10,color:"#b8935a",fontWeight:600}}>{pct}%</span>
                    </div>
                    <div style={{height:5,background:"#ede8df",borderRadius:3}}>
                      <div style={{width:`${pct}%`,height:"100%",background:pct===100?"#3a9a5a":"#b8935a",borderRadius:3,transition:"width .4s"}}/>
                    </div>
                  </div>
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                      <span style={{fontSize:10,color:"#b0a090"}}>Bütçe Kullanımı</span>
                      <span style={{fontSize:10,color:budgetPct>90?"#c04040":"#b8935a",fontWeight:600}}>{budgetPct}%</span>
                    </div>
                    <div style={{height:5,background:"#ede8df",borderRadius:3}}>
                      <div style={{width:`${Math.min(budgetPct,100)}%`,height:"100%",background:budgetPct>90?"#c04040":"#4a7ab0",borderRadius:3}}/>
                    </div>
                  </div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:10,paddingTop:10,borderTop:"1px solid #ede8df"}}>
                  <span style={{fontSize:11.5,color:"#8a7868"}}>Bütçe: <strong style={{color:"#b8935a"}}>{fmt(p.budget)}</strong></span>
                  <span style={{fontSize:11.5,color:"#8a7868"}}>Harcanan: <strong style={{color:budgetPct>90?"#c04040":"#3a2a18"}}>{fmt(p.spent)}</strong></span>
                  <span style={{fontSize:11.5,color:"#8a7868"}}>Kalan: <strong style={{color:"#3a9a5a"}}>{fmt(p.budget-p.spent)}</strong></span>
                </div>
              </div>
            );
          })}
        </div>
      </>}
      {!sel && mode==="new" && (
        <div className="card">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            {[["Proje Adı","name","text"],["Müşteri / Kaynak","client","text"],["Bütçe (TL)","budget","number"],["Harcanan (TL)","spent","number"],["Başlangıç","startDate","date"],["Bitiş","endDate","date"]].map(([l,k,t])=>(
              <div key={k}><span className="lbl">{l}</span><input className="inp" type={t} value={form[k]} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}/></div>
            ))}
            <div><span className="lbl">Durum</span><select className="inp" value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}><option>Başlamadı</option><option>Devam Ediyor</option><option>Beklemede</option><option>Tamamlandı</option></select></div>
            <div><span className="lbl">Öncelik</span><select className="inp" value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))}><option>Normal</option><option>Yüksek</option><option>Düşük</option></select></div>
            <div style={{gridColumn:"span 2"}}><span className="lbl">Açıklama</span><textarea className="inp" value={form.desc} onChange={e=>setForm(p=>({...p,desc:e.target.value}))}/></div>
          </div>
          <div style={{marginBottom:10}}>
            <span className="lbl">Görevler</span>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input className="inp" value={newTask} onChange={e=>setNewTask(e.target.value)} placeholder="Görev ekle..." style={{flex:1}}/>
              <button className="bg" onClick={()=>{if(newTask.trim()){setForm(p=>({...p,tasks:[...p.tasks,{t:newTask,done:false}]}));setNewTask("");}}} >Ekle</button>
            </div>
            {form.tasks.map((t,i)=><div key={i} style={{fontSize:12,padding:"6px 10px",background:"#faf8f4",borderRadius:5,marginBottom:4,display:"flex",justifyContent:"space-between"}}><span>{t.t}</span><button className="bg" style={{fontSize:9,padding:"1px 7px",color:"#c04040"}} onClick={()=>setForm(p=>({...p,tasks:p.tasks.filter((_,ti)=>ti!==i)}))}>✕</button></div>)}
          </div>
          <button className="bp" style={{width:"100%"}} onClick={save}>Projeyi Kaydet</button>
        </div>
      )}
      {sel && (
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:14}}>
          <div>
            <div className="card" style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:"#3a2a18"}}>{sel.name}</div><div style={{fontSize:11,color:"#b0a090",marginTop:2}}>{sel.client}</div></div>
                <span style={{fontSize:11,padding:"4px 12px",borderRadius:12,background:`rgba(${statusColor(sel.status).replace("#","")},.1)`,color:statusColor(sel.status),border:`1px solid ${statusColor(sel.status)}33`}}>{sel.status}</span>
              </div>
              <div style={{fontSize:12,color:"#8a7868",marginBottom:14}}>{sel.desc}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                {[["Bütçe",fmt(sel.budget),"#b8935a"],["Harcanan",fmt(sel.spent),"#c04040"],["Kalan",fmt(sel.budget-sel.spent),"#3a9a5a"]].map(([l,v,c])=>(
                  <div key={l} style={{background:"#faf8f4",borderRadius:7,padding:"12px",border:"1px solid #ede8df",textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#b0a090",marginBottom:3}}>{l}</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:c}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="card">
              <span className="lbl" style={{marginBottom:12}}>Görevler ({sel.tasks.filter(t=>t.done).length}/{sel.tasks.length} tamamlandı)</span>
              {sel.tasks.map((t,i)=>(
                <div key={i} onClick={()=>toggleTask(sel,i)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid #ede8df",cursor:"pointer"}}>
                  <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${t.done?"#3a9a5a":"#e0d9ce"}`,background:t.done?"#3a9a5a":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                    {t.done && <span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
                  </div>
                  <span style={{fontSize:12.5,color:t.done?"#b0a090":"#3a2a18",textDecoration:t.done?"line-through":"none"}}>{t.t}</span>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div className="card" style={{marginBottom:12}}>
              <span className="lbl" style={{marginBottom:10}}>Proje Detayları</span>
              {[["Başlangıç",sel.startDate],["Bitiş",sel.endDate],["Öncelik",sel.priority],["Durum",sel.status]].map(([l,v])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #ede8df",fontSize:12}}>
                  <span style={{color:"#b0a090"}}>{l}</span><span style={{color:"#3a2a18",fontWeight:500}}>{v}</span>
                </div>
              ))}
            </div>
            <div className="card">
              <span className="lbl" style={{marginBottom:8}}>İlerleme</span>
              {[["Görev",Math.round(sel.tasks.filter(t=>t.done).length/Math.max(sel.tasks.length,1)*100),"#b8935a"],["Bütçe",Math.min(100,Math.round(sel.spent/Math.max(sel.budget,1)*100)),"#4a7ab0"]].map(([l,v,c])=>(
                <div key={l} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:11}}><span style={{color:"#b0a090"}}>{l}</span><span style={{color:c,fontWeight:600}}>{v}%</span></div>
                  <div style={{height:8,background:"#ede8df",borderRadius:4}}><div style={{width:`${v}%`,height:"100%",background:c,borderRadius:4,transition:"width .5s"}}/></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TEDARİKÇİLER MODULE ─────────────────────────────────────────────────────
function TedarikciModule({store}) {
  const [list, setList] = useState(()=>store.get("znn_tedairkci")||[]);

  const fmt = n=>new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(n);
  const save = () => {
    const np={...form,id:list.length+1,totalOrders:+form.totalOrders,totalSpent:+form.totalSpent,rating:+form.rating,paymentTerm:+form.paymentTerm};
    const u=[...list,np]; setList(u); store.set("znn_tedairkci",u); setMode("list");
  };
  const catColors={"Hammadde":"#b8935a","Metal & Aksesuar":"#4a7ab0","Döşeme Malzemesi":"#3a9a5a","Kimyasal":"#c04040","Lojistik":"#7a5ab0","Diğer":"#a09080"};

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:300,color:"#7a5030"}}>Tedarikçiler</div>
        {mode==="list"?<button className="bp" onClick={()=>setMode("new")}>+ Tedarikçi Ekle</button>:<button className="bg" onClick={()=>setMode("list")}>İptal</button>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
        {[["Toplam",list.length,"#a09080"],["Aktif",list.filter(t=>t.status==="Aktif").length,"#3a9a5a"],["Toplam Harcama",fmt(list.reduce((s,t)=>s+t.totalSpent,0)),"#b8935a"],["Ort. Vade",`${Math.round(list.reduce((s,t)=>s+t.paymentTerm,0)/Math.max(list.length,1))} gün`,"#4a7ab0"]].map(([l,v,c])=>(
          <div key={l} style={{background:"#fff",border:"1px solid #e8e2d8",borderRadius:9,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
            <div style={{fontSize:9.5,color:"#b0a090",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{l}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      {mode==="new" && (
        <div className="card" style={{marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {[["Firma Adı","name","text"],["Yetkili Kişi","contact","text"],["Telefon","phone","text"],["E-posta","email","email"],["Şehir","city","text"],["Vade (gün)","paymentTerm","number"]].map(([l,k,t])=>(
              <div key={k}><span className="lbl">{l}</span><input className="inp" type={t} value={form[k]} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}/></div>
            ))}
            <div><span className="lbl">Kategori</span><select className="inp" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>{["Hammadde","Metal & Aksesuar","Döşeme Malzemesi","Kimyasal","Lojistik","Diğer"].map(c=><option key={c}>{c}</option>)}</select></div>
            <div><span className="lbl">Durum</span><select className="inp" value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}><option>Aktif</option><option>Pasif</option></select></div>
            <div><span className="lbl">Puan (1-5)</span><input className="inp" type="number" min="1" max="5" value={form.rating} onChange={e=>setForm(p=>({...p,rating:+e.target.value}))}/></div>
          </div>
          <button className="bp" style={{marginTop:12,width:"100%"}} onClick={save}>Tedarikçi Kaydet</button>
        </div>
      )}
      <div className="card">
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr><th>Firma</th><th>Kategori</th><th>Yetkili</th><th>Şehir</th><th>Vade</th><th>Toplam Harcama</th><th>Puan</th><th>Durum</th></tr></thead>
          <tbody>
            {list.map(t=>(
              <tr key={t.id} className="tr">
                <td><div style={{fontSize:13,color:"#3a2a18",fontWeight:500}}>{t.name}</div><div style={{fontSize:10,color:"#b0a090"}}>{t.email}</div></td>
                <td><span style={{fontSize:10.5,padding:"2px 8px",borderRadius:10,background:`${catColors[t.category]||"#a09080"}15`,color:catColors[t.category]||"#a09080",border:`1px solid ${catColors[t.category]||"#a09080"}30`}}>{t.category}</span></td>
                <td style={{fontSize:12,color:"#8a7868"}}>{t.contact}<div style={{fontSize:10,color:"#b0a090"}}>{t.phone}</div></td>
                <td style={{fontSize:12,color:"#8a7868"}}>{t.city}</td>
                <td style={{fontSize:12,color:"#b8935a",fontWeight:600}}>{t.paymentTerm} gün</td>
                <td style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:"#b8935a"}}>{fmt(t.totalSpent)}</td>
                <td><div style={{display:"flex",gap:2}}>{[1,2,3,4,5].map(s=><span key={s} style={{fontSize:12,color:s<=t.rating?"#f0a020":"#e0d9ce"}}>★</span>)}</div></td>
                <td><span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:t.status==="Aktif"?"rgba(74,161,106,.1)":"rgba(160,144,128,.1)",color:t.status==="Aktif"?"#3a9a5a":"#a09080",border:`1px solid ${t.status==="Aktif"?"rgba(74,161,106,.25)":"rgba(160,144,128,.25)"}`}}>{t.status}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── BANKA & FİNANS MODULE ───────────────────────────────────────────────────
function BankaModule({store}) {
  const [hesaplar, setHesaplar] = useState(()=>store.get("znn_hesaplar")||[]);
  const [islemler, setIslemler] = useState(()=>store.get("znn_islemler")||[]);
  const [tab, setTab] = useState("overview");

  const totalBalance = hesaplar.reduce((s,h)=>s+h.balance,0);
  const totalIn = islemler.filter(i=>i.type==="Gelir").reduce((s,i)=>s+i.amount,0);
  const totalOut = islemler.filter(i=>i.type==="Gider").reduce((s,i)=>s+i.amount,0);
  const saveIslem = () => {
    const ni={...form,id:islemler.length+1,amount:+form.amount};
    const u=[ni,...islemler]; setIslemler(u); store.set("znn_islemler",u);
    setForm({date:"",desc:"",type:"Gelir",category:"Satış",amount:"",account:hesaplar[0]?.bank||"",ref:""});

    <div>

        {[["Toplam Bakiye",fmt(totalBalance),"#b8935a"],["Bu Ay Gelir",fmt(totalIn),"#3a9a5a"],["Bu Ay Gider",fmt(totalOut),"#c04040"],["Net Nakit",fmt(totalIn-totalOut),"#4a7ab0"]].map(([l,v,c])=>(
          <div key={l} style={{background:"#fff",border:"1px solid #e8e2d8",borderRadius:9,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
            <div style={{fontSize:9.5,color:"#b0a090",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{l}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["overview","🏦 Hesaplar"],["transactions","↕ İşlemler"],["new","+ Yeni İşlem"]].map(([t,l])=>(
          <div key={t} className={`tab ${tab===t?"act2":""}`} onClick={()=>setTab(t)}>{l}</div>
        ))}
      </div>
      {tab==="overview" && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
          {hesaplar.map(h=>(
            <div key={h.id} className="card" style={{position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:h.color}}/>

                  <div style={{fontSize:10,color:"#b0a090",marginTop:2}}>{h.type} · {h.branch}</div>
                </div>
                <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:"rgba(184,147,90,.1)",color:"#b8935a",border:"1px solid rgba(184,147,90,.25)"}}>{h.currency}</span>
              </div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,color:"#3a2a18",marginBottom:8}}>{fmt(h.balance)}</div>
              <div style={{fontSize:9.5,color:"#b0a090",letterSpacing:1,fontFamily:"monospace"}}>{h.iban}</div>
            </div>
          ))}
        </div>
      )}
      {tab==="transactions" && (
        <div className="card">
          <table style={{width:"100%",borderCollapse:"collapse"}}>

              {islemler.map(i=>(
                <tr key={i.id} className="tr">

                  <td style={{color:"#3a2a18",fontSize:12.5}}>{i.desc}<div style={{fontSize:9.5,color:"#b0a090"}}>{i.ref}</div></td>
                  <td><span style={{fontSize:10.5,padding:"2px 8px",borderRadius:10,background:i.type==="Gelir"?"rgba(74,161,106,.1)":"rgba(192,64,64,.1)",color:i.type==="Gelir"?"#3a9a5a":"#c04040",border:`1px solid ${i.type==="Gelir"?"rgba(74,161,106,.25)":"rgba(192,64,64,.25)"}`}}>{i.type==="Gelir"?"↑":"↓"} {i.type}</span></td>
                  <td style={{fontSize:11.5,color:"#8a7868"}}>{i.category}</td>

// ─── MUHASEBE MODULE ─────────────────────────────────────────────────────────
function MuhasebeModule({store}) {
  const islemler = store.get("znn_islemler")||[];
  const giderler = store.get("znn_giderler")||[];
  const proformas = store.get("znn_proformas")||[];
  const fmt = n=>new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(n);
  const calcPrf = p=>{const s=p.items.reduce((x,i)=>x+i.price*i.qty,0);const d=s*(p.discount/100);const v=(s-d)*(p.vat/100);return{total:s-d+v};};
  const totalSales = proformas.filter(p=>p.status==="Onaylandı").reduce((s,p)=>s+calcPrf(p).total,0);
  const totalGider = giderler.filter(g=>g.paid).reduce((s,g)=>s+g.amount,0);
  const brutKar = totalSales - totalGider;
  const [tab, setTab] = useState("ozet");
  const catTotals = {};
  giderler.forEach(g=>{catTotals[g.category]=(catTotals[g.category]||0)+g.amount;});

  return (
    <div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:300,color:"#7a5030",marginBottom:16}}>Muhasebe</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
        {[["Toplam Ciro",fmt(totalSales),"#b8935a"],["Toplam Gider",fmt(totalGider),"#c04040"],["Brüt Kar",fmt(brutKar),"#3a9a5a"],["Kar Marjı",`%${totalSales>0?Math.round(brutKar/totalSales*100):0}`,"#4a7ab0"]].map(([l,v,c])=>(
          <div key={l} style={{background:"#fff",border:"1px solid #e8e2d8",borderRadius:9,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
            <div style={{fontSize:9.5,color:"#b0a090",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{l}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["ozet","📊 Özet"],["gelir","↑ Gelir"],["gider","↓ Gider"],["kdv","% KDV"]].map(([t,l])=>(
          <div key={t} className={`tab ${tab===t?"act2":""}`} onClick={()=>setTab(t)}>{l}</div>
        ))}
      </div>
      {tab==="ozet" && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div className="card">
            <span className="lbl" style={{marginBottom:12}}>Gelir - Gider Özeti</span>
            {[["Onaylı Proformalar",fmt(totalSales),"#b8935a"],["Ödenen Giderler",`-${fmt(totalGider)}`,"#c04040"],["Bekleyen Giderler",`-${fmt(giderler.filter(g=>!g.paid).reduce((s,g)=>s+g.amount,0))}`,"#e09060"],["Brüt Kar",fmt(brutKar),"#3a9a5a"]].map(([l,v,c])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #ede8df"}}>
                <span style={{fontSize:12.5,color:"#8a7868"}}>{l}</span>
                <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:c,fontWeight:600}}>{v}</span>
              </div>
            ))}
          </div>
          <div className="card">
            <span className="lbl" style={{marginBottom:12}}>Gider Kategorileri</span>
            {Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
              const pct=Math.round(amt/Math.max(totalGider,1)*100);
              return (
                <div key={cat} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
                    <span style={{color:"#8a7868"}}>{cat}</span>
                    <span style={{color:"#b8935a",fontWeight:600}}>{fmt(amt)}</span>
                  </div>
                  <div style={{height:5,background:"#ede8df",borderRadius:3}}>
                    <div style={{width:`${pct}%`,height:"100%",background:"#b8935a",borderRadius:3}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {tab==="gelir" && (
        <div className="card">
          <span className="lbl" style={{marginBottom:12}}>Onaylı Satışlar</span>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr><th>No</th><th>Müşteri</th><th>Tarih</th><th>KDV Matrahı</th><th>KDV</th><th>Toplam</th></tr></thead>
            <tbody>
              {proformas.filter(p=>p.status==="Onaylandı").map(p=>{
                const sub=p.items.reduce((x,i)=>x+i.price*i.qty,0);
                const disc=sub*(p.discount/100);
                const matr=sub-disc;
                const kdv=matr*(p.vat/100);
                return (
                  <tr key={p.id} className="tr">
                    <td style={{color:"#b8935a",fontWeight:600,fontSize:11}}>{p.id}</td>
                    <td style={{color:"#3a2a18"}}>{p.customer}</td>
                    <td style={{color:"#b0a090",fontSize:11}}>{p.date}</td>
                    <td style={{color:"#8a7868"}}>{fmt(matr)}</td>
                    <td style={{color:"#c04040"}}>{fmt(kdv)}</td>
                    <td style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:"#3a9a5a"}}>{fmt(matr+kdv)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      {tab==="gider" && (
        <div className="card">
          <span className="lbl" style={{marginBottom:12}}>Tüm Giderler</span>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr><th>Tarih</th><th>Açıklama</th><th>Kategori</th><th>Tutar</th><th>Durum</th></tr></thead>
            <tbody>
              {giderler.map(g=>(
                <tr key={g.id} className="tr">
                  <td style={{fontSize:11,color:"#b0a090"}}>{g.date}</td>
                  <td style={{color:"#3a2a18"}}>{g.desc}{g.recurring&&<span style={{fontSize:9,marginLeft:6,color:"#4a7ab0",border:"1px solid rgba(74,120,176,.3)",borderRadius:4,padding:"1px 5px"}}>🔄 Tekrar</span>}</td>
                  <td style={{fontSize:11.5,color:"#8a7868"}}>{g.category}</td>
                  <td style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:"#c04040"}}>{fmt(g.amount)}</td>
                  <td><span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:g.paid?"rgba(74,161,106,.1)":"rgba(184,147,90,.1)",color:g.paid?"#3a9a5a":"#b8935a",border:`1px solid ${g.paid?"rgba(74,161,106,.25)":"rgba(184,147,90,.25)"}`}}>{g.paid?"Ödendi":"Bekliyor"}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      {tab==="kdv" && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div className="card">
            <span className="lbl" style={{marginBottom:12}}>Hesaplanan KDV (Satış)</span>
            {proformas.filter(p=>p.status==="Onaylandı").map(p=>{
              const sub=p.items.reduce((x,i)=>x+i.price*i.qty,0)*(1-p.discount/100);
              const kdv=sub*(p.vat/100);
              return (<div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #ede8df",fontSize:12}}>
                <span style={{color:"#8a7868"}}>{p.id} - {p.customer}</span>
                <span style={{color:"#c04040",fontWeight:600}}>%{p.vat} · {fmt(kdv)}</span>
              </div>);
            })}
            <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",fontSize:13,fontWeight:600}}>
              <span style={{color:"#b0a090"}}>Toplam Hesaplanan KDV</span>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"#c04040"}}>{fmt(proformas.filter(p=>p.status==="Onaylandı").reduce((s,p)=>{const sub=p.items.reduce((x,i)=>x+i.price*i.qty,0)*(1-p.discount/100);return s+sub*(p.vat/100);},0))}</span>
            </div>
          </div>
          <div className="card">
            <span className="lbl" style={{marginBottom:12}}>KDV Özeti</span>
            {[["KDV Oranları","—"],["Hesaplanan KDV",fmt(proformas.filter(p=>p.status==="Onaylandı").reduce((s,p)=>{const sub=p.items.reduce((x,i)=>x+i.price*i.qty,0)*(1-p.discount/100);return s+sub*(p.vat/100);},0))],["İndirilecek KDV",fmt(18400)],["Ödenecek KDV",fmt(proformas.filter(p=>p.status==="Onaylandı").reduce((s,p)=>{const sub=p.items.reduce((x,i)=>x+i.price*i.qty,0)*(1-p.discount/100);return s+sub*(p.vat/100);},0)-18400)]].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #ede8df",fontSize:12}}>
                <span style={{color:"#8a7868"}}>{l}</span><span style={{color:"#b8935a",fontWeight:600}}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── GİDER TAKİBİ MODULE ─────────────────────────────────────────────────────
function GiderModule({store}) {
  const [list, setList] = useState(()=>store.get("znn_giderler")||[]);
  const [form, setForm] = useState({date:"",desc:"",category:"Tedarik",amount:"",paid:false,recurring:false});
  const [filter, setFilter] = useState("Tümü");
  const fmt = n=>new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(n);
  const save = () => {
    const ng={...form,id:list.length+1,amount:+form.amount};
    const u=[...list,ng]; setList(u); store.set("znn_giderler",u);
    setForm({date:"",desc:"",category:"Tedarik",amount:"",paid:false,recurring:false});
  };
  const togglePaid = id => {
    const u=list.map(g=>g.id===id?{...g,paid:!g.paid}:g);
    setList(u); store.set("znn_giderler",u);
  };
  const filtered = filter==="Tümü"?list:filter==="Ödendi"?list.filter(g=>g.paid):filter==="Bekliyor"?list.filter(g=>!g.paid):list.filter(g=>g.category===filter);
  const totalOdendi = list.filter(g=>g.paid).reduce((s,g)=>s+g.amount,0);
  const totalBekli = list.filter(g=>!g.paid).reduce((s,g)=>s+g.amount,0);
  const catColors2 = {"Personel":"#4a7ab0","Kira":"#b8935a","Tedarik":"#3a9a5a","Fatura":"#7a5ab0","Pazarlama":"#c04040","Danışmanlık":"#e09060","Ulaşım":"#3a8a9a","Diğer":"#a09080"};

  return (
    <div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:300,color:"#7a5030",marginBottom:16}}>Gider Takibi</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
        {[["Toplam Gider",fmt(list.reduce((s,g)=>s+g.amount,0)),"#c04040"],["Ödendi",fmt(totalOdendi),"#3a9a5a"],["Bekliyor",fmt(totalBekli),"#b8935a"],["Tekrar Eden",list.filter(g=>g.recurring).length+" kalem","#4a7ab0"]].map(([l,v,c])=>(
          <div key={l} style={{background:"#fff",border:"1px solid #e8e2d8",borderRadius:9,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
            <div style={{fontSize:9.5,color:"#b0a090",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{l}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:14}}>
        <div className="card">
          <span className="lbl" style={{marginBottom:10}}>Yeni Gider Ekle</span>
          <div style={{marginBottom:8}}><span className="lbl">Tarih</span><input className="inp" type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div>
          <div style={{marginBottom:8}}><span className="lbl">Açıklama</span><input className="inp" value={form.desc} onChange={e=>setForm(p=>({...p,desc:e.target.value}))}/></div>
          <div style={{marginBottom:8}}><span className="lbl">Kategori</span><select className="inp" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>{GIDER_CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div style={{marginBottom:8}}><span className="lbl">Tutar (TL)</span><input className="inp" type="number" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/></div>
          <div style={{display:"flex",gap:14,marginBottom:12}}>
            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,color:"#8a7868"}}>
              <input type="checkbox" checked={form.paid} onChange={e=>setForm(p=>({...p,paid:e.target.checked}))}/> Ödendi
            </label>
            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,color:"#8a7868"}}>
              <input type="checkbox" checked={form.recurring} onChange={e=>setForm(p=>({...p,recurring:e.target.checked}))}/> Tekrar Eden
            </label>
          </div>
          <button className="bp" style={{width:"100%"}} onClick={save}>Gider Ekle</button>
          <div style={{marginTop:16,paddingTop:12,borderTop:"1px solid #ede8df"}}>
            <span className="lbl" style={{marginBottom:8}}>Kategori Filtresi</span>
            {["Tümü","Ödendi","Bekliyor",...GIDER_CATS].map(f=>(
              <div key={f} onClick={()=>setFilter(f)} style={{padding:"6px 10px",borderRadius:6,marginBottom:4,cursor:"pointer",fontSize:12,background:filter===f?"rgba(184,147,90,.1)":"transparent",color:filter===f?"#7a5030":"#8a7868",border:filter===f?"1px solid rgba(184,147,90,.3)":"1px solid transparent",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>{f}</span>
                {catColors2[f] && <span style={{width:8,height:8,borderRadius:"50%",background:catColors2[f],display:"inline-block"}}/>}
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span className="lbl" style={{marginBottom:0}}>{filtered.length} gider kaydı</span>
            <span style={{fontSize:11,color:"#b8935a",fontFamily:"'Cormorant Garamond',serif"}}>{fmt(filtered.reduce((s,g)=>s+g.amount,0))}</span>
          </div>
          {filtered.map(g=>(
            <div key={g.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid #ede8df"}}>
              <div onClick={()=>togglePaid(g.id)} style={{width:18,height:18,borderRadius:4,border:`2px solid ${g.paid?"#3a9a5a":"#e0d9ce"}`,background:g.paid?"#3a9a5a":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",transition:"all .15s"}}>
                {g.paid && <span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12.5,color:g.paid?"#b0a090":"#3a2a18",textDecoration:g.paid?"line-through":"none"}}>{g.desc}
                  {g.recurring && <span style={{fontSize:9,marginLeft:6,color:"#4a7ab0",border:"1px solid rgba(74,120,176,.3)",borderRadius:4,padding:"1px 5px"}}>🔄</span>}
                </div>
                <div style={{fontSize:10,color:"#b0a090",marginTop:1}}>{g.date} · {g.category}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,color:g.paid?"#b0a090":"#c04040"}}>{fmt(g.amount)}</div>
                <span style={{fontSize:10,padding:"1px 7px",borderRadius:10,background:g.paid?"rgba(74,161,106,.1)":"rgba(184,147,90,.1)",color:g.paid?"#3a9a5a":"#b8935a",border:`1px solid ${g.paid?"rgba(74,161,106,.25)":"rgba(184,147,90,.25)"}`}}>{g.paid?"Ödendi":"Bekliyor"}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── FATURA MODULE ─────────────────────────────────────────────────────────────
function FaturaModule({store, proformas}) {
  const fmt=n=>new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(n);
  const calcPrf = p=>{const s=p.items.reduce((x,i)=>x+i.price*i.qty,0);const d=s*(p.discount/100);const v=(s-d)*(p.vat/100);return{sub:s,disc:d,vat:v,total:s-d+v};};
  const [faturalar, setFaturalar] = useState(()=>store.get("znn_faturalar")||
    proformas.filter(p=>p.status==="Onaylandı").map((p,i)=>{
      const {total,vat}=calcPrf(p);
      return {id:`FTR-${String(i+1).padStart(3,"0")}`,proformaId:p.id,customer:p.customer,date:p.date,dueDate:p.validUntil,total,vat,status:"Ödendi",type:"Satış Faturası"};
    })
  );
  const [tab,setTab]=useState("list");
  const totalFat=faturalar.reduce((s,f)=>s+f.total,0);
  const totalVat=faturalar.reduce((s,f)=>s+f.vat,0);
  const odenmemis=faturalar.filter(f=>f.status==="Beklemede").reduce((s,f)=>s+f.total,0);

  const statusColor=s=>s==="Ödendi"?"#3a9a5a":s==="Beklemede"?"#b8935a":"#c04040";

  return (
    <div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:300,color:"#7a5030",marginBottom:16}}>Fatura Yönetimi</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
        {[["Toplam Fatura",faturalar.length,"#a09080"],["Toplam Tutar",fmt(totalFat),"#b8935a"],["Ödenmemiş",fmt(odenmemis),"#c04040"],["Toplam KDV",fmt(totalVat),"#4a7ab0"]].map(([l,v,c])=>(
          <div key={l} style={{background:"#fff",border:"1px solid #e8e2d8",borderRadius:9,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
            <div style={{fontSize:9.5,color:"#b0a090",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{l}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["list","📋 Tüm Faturalar"],["overdue","⚠ Vadesi Geçen"]].map(([t,l])=>(
          <div key={t} className={`tab ${tab===t?"act2":""}`} onClick={()=>setTab(t)}>{l}</div>
        ))}
      </div>
      <div className="card">
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr><th>Fatura No</th><th>Müşteri</th><th>Proforma</th><th>Tarih</th><th>Vade</th><th>KDV</th><th>Toplam</th><th>Durum</th></tr></thead>
          <tbody>
            {(tab==="overdue"?faturalar.filter(f=>f.status!=="Ödendi"&&new Date(f.dueDate)<new Date()):faturalar).map(f=>(
              <tr key={f.id} className="tr">
                <td style={{color:"#b8935a",fontWeight:600,fontSize:11.5}}>{f.id}</td>
                <td style={{color:"#3a2a18",fontSize:13}}>{f.customer}</td>
                <td style={{color:"#b0a090",fontSize:11}}>{f.proformaId||"—"}</td>
                <td style={{color:"#b0a090",fontSize:11}}>{f.date}</td>
                <td style={{color:new Date(f.dueDate)<new Date()&&f.status!=="Ödendi"?"#c04040":"#b0a090",fontSize:11}}>{f.dueDate}</td>
                <td style={{color:"#c04040",fontSize:12}}>{fmt(f.vat)}</td>
                <td style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:"#3a2a18"}}>{fmt(f.total)}</td>
                <td>
                  <select value={f.status} style={{background:"#faf8f4",border:"1px solid #e0d9ce",color:statusColor(f.status),padding:"3px 7px",borderRadius:4,fontSize:10.5,fontFamily:"'DM Sans',sans-serif",outline:"none"}}
                    onChange={e=>{const u=faturalar.map(x=>x.id===f.id?{...x,status:e.target.value}:x);setFaturalar(u);store.set("znn_faturalar",u);}}>
                    <option>Ödendi</option><option>Beklemede</option><option>İptal</option>
                  </select>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── SİPARİŞ MODULE ───────────────────────────────────────────────────────────
function SiparisModule({store}) {

    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>

          <div key={l} style={{background:"#fff",border:"1px solid #e8e2d8",borderRadius:9,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
            <div style={{fontSize:9.5,color:"#b0a090",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{l}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,color:c}}>{v}</div>
          </div>
        ))}
      </div>
      {!sel && mode==="list" && (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {list.map(s=>(
            <div key={s.id} onClick={()=>setSel(s)} className="card" style={{cursor:"pointer"}}

                  <div style={{fontSize:14,color:"#3a2a18",fontWeight:500}}>{s.customer}</div>
                  <div style={{fontSize:11,color:"#b0a090",marginTop:2}}>📍 {s.address}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"#b8935a"}}>{fmt(s.total)}</div>
                  <div style={{fontSize:10.5,color:"#b0a090",marginTop:2}}>Teslimat: {s.deliveryDate}</div>
                  <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:`${statusColor(s.status)}15`,color:statusColor(s.status),border:`1px solid ${statusColor(s.status)}33`,marginTop:4,display:"inline-block"}}>{s.status}</span>
                </div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",gap:0,flex:1,marginRight:20}}>

                    <div key={step} style={{flex:1,display:"flex",alignItems:"center"}}>
                      <div style={{width:14,height:14,borderRadius:"50%",background:statusSteps.indexOf(s.status)>=i?statusColor(s.status):"#e0d9ce",border:`2px solid ${statusSteps.indexOf(s.status)>=i?statusColor(s.status):"#e0d9ce"}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        {statusSteps.indexOf(s.status)>i&&<span style={{fontSize:8,color:"#fff",fontWeight:700}}>✓</span>}
                      </div>
                      {i<statusSteps.length-1&&<div style={{flex:1,height:2,background:statusSteps.indexOf(s.status)>i?statusColor(s.status):"#e0d9ce"}}/>}
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:6}} onClick={e=>e.stopPropagation()}>
                  {statusSteps.filter((_,i)=>i>statusSteps.indexOf(s.status)).slice(0,1).map(next=>(
                    <button key={next} className="bp" style={{fontSize:10,padding:"4px 10px"}} onClick={()=>updateStatus(s.id,next)}>→ {next}</button>

      )}

      {sel && (

            <div className="card" style={{marginBottom:12}}>

                <div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:"#3a2a18"}}>{sel.customer}</div><div style={{fontSize:11,color:"#b8935a",marginTop:2}}>{sel.id}</div></div>
                <span style={{fontSize:11,padding:"4px 14px",borderRadius:12,background:`${statusColor(sel.status)}15`,color:statusColor(sel.status),border:`1px solid ${statusColor(sel.status)}33`}}>{sel.status}</span>
              </div>
              <div style={{marginBottom:14}}>
                <span className="lbl" style={{marginBottom:8}}>Sevkiyat Durumu</span>
                <div style={{display:"flex",alignItems:"center",gap:0}}>
                  {statusSteps.map((step,i)=>(
                    <div key={step} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                      <div style={{display:"flex",alignItems:"center",width:"100%"}}>

                        <div onClick={()=>updateStatus(sel.id,step)} style={{width:22,height:22,borderRadius:"50%",background:statusSteps.indexOf(sel.status)>=i?statusColor(sel.status):"#f5f0e8",border:`2px solid ${statusSteps.indexOf(sel.status)>=i?statusColor(sel.status):"#e0d9ce"}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                          {statusSteps.indexOf(sel.status)>=i&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}

                      </div>

// ─── ŞİKAYET MODULE ───────────────────────────────────────────────────────────

  );

    const nn={...form,id:notes.length+1,date:new Date().toISOString().split("T")[0]};

  const filtered=notes.filter(n=>!search||n.title.toLowerCase().includes(search.toLowerCase())||n.content.toLowerCase().includes(search.toLowerCase()));
  const pinned=filtered.filter(n=>n.pinned);

// ─── AI ASİSTAN MODULE (KAPSAMLI) ────────────────────────────────────────────
const AI_SYSTEM = `Sen Zenniva mobilya şirketinin kapsamlı iş asistanısın ve platform yöneticisisin.

ZENNIVA HAKKINDA:
- Bursa/Nilüfer'de faaliyet gösteren premium mobilya tasarım ve satış şirketi
- Ürünler: Oslo, Zen, Nordic, Milano, Natura, Vega, Luna, Aster, Kyoto, Arko koleksiyonları
- Müşteriler: bireysel ve kurumsal (Yılmaz Mobilya, Dekor Plus vb.)

YETKİLERİN:
1. PLATFORM VERİSİNİ OKUMA - kullanıcı platform verisini sana ilettiğinde analiz et
2. PLATFORM VERİSİNİ DÜZENLEME - JSON komutlarla platforma kayıt ekle/güncelle
3. İÇERİK ÜRETME - proforma, e-posta, sosyal medya, rapor, sözleşme metni yaz
4. ANALİZ - satış trendleri, stok durumu, finans özeti, performans analizi
5. STRATEJİ - fiyatlandırma, pazarlama, müşteri ilişkileri, tedarik tavsiyeleri

PLATFORM KOMUTLARI:
Platforma veri eklemek istediğinde yanıtına şu formatı ekle:

\`\`\`platform-action
{"action":"ADD_CUSTOMER","data":{"name":"Ad Soyad","email":"","phone":"","city":"","company":""}}
\`\`\`

\`\`\`platform-action
{"action":"ADD_PRODUCT","data":{"name":"","category":"Oturma Odası","price":0,"cost":0,"stock":0,"unit":"Adet","sku":"ZN-XXX-000","emoji":"🛋️"}}
\`\`\`

\`\`\`platform-action
{"action":"ADD_REMINDER","data":{"title":"","desc":"","date":"2026-03-20","time":"09:00","priority":"Orta","category":"Diğer","repeat":"Tekrarsız"}}
\`\`\`

\`\`\`platform-action
{"action":"ADD_NOTE","data":{"title":"","content":"","category":"Genel","color":"#b8935a","pinned":false}}
\`\`\`

\`\`\`platform-action
{"action":"ADD_EXPENSE","data":{"date":"2026-03-15","desc":"","category":"Diğer","amount":0,"paid":false,"recurring":false}}
\`\`\`

\`\`\`platform-action
{"action":"ADD_TRANSACTION","data":{"date":"2026-03-15","desc":"","type":"Gelir","category":"Satış","amount":0,"account":"Ziraat Bankası","ref":""}}
\`\`\`

\`\`\`platform-action
{"action":"ADD_PROFORMA_ITEMS","data":[{"name":"","qty":1,"price":0,"unit":"Adet"}]}
\`\`\`

\`\`\`platform-action
{"action":"BATCH","actions":[{"action":"ADD_CUSTOMER","data":{}},{"action":"ADD_REMINDER","data":{}}]}
\`\`\`

Birden fazla işlem için BATCH kullan. Platform aksiyonlarını açıklayarak sun, kullanıcı onaylar sonrası uygula.
Türkçe konuş. Markdown kullan: **kalın**, *italik*, - liste.

PDF KATALOG MODÜLÜ:
Kullanıcı "pdf katalog" veya "katalog" ile ilgili bir şey istediğinde, platforma yönlendir:
"PDF Katalog modülüne gidin (sol menü), + Ürün Ekle butonuyla fotoğraf yükleyin. AI otomatik açıklama yazar. Hazır olunca PDF Oluştur butonuyla profesyonel katalog alırsınız."
PDF Katalog için platform-action kullanma — kullanıcının modüle gidip fotoğraf yüklemesi gerekir.`;

function AIAsistanModule({store}) {
  const [messages, setMessages] = useState(() => store.get("znn_ai_history") || [
    {role:"assistant", content:"Merhaba! Ben Zenniva'nın **kapsamlı AI asistanıyım**. 🏠\n\nPlatformdaki her şeyi okuyabilir ve düzenleyebilirim:\n\n**📊 Analiz:** Satış, stok, finans durumu\n**✏️ Düzenleme:** Müşteri, ürün, hatırlatıcı, not ekle\n**📄 İçerik:** Proforma kalemleri, e-posta, sözleşme metni\n**🔍 Dosya:** Excel, PDF, Word, fotoğraf analizi\n**💡 Strateji:** Fiyatlandırma, pazarlama, tedarik önerileri\n\nNasıl yardımcı olabilirim?", actions:[]}
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [file, setFile] = useState(null);
  const [filePreview, setFilePreview] = useState(null);
  const [showImportModal, setShowImportModal] = useState(false);
  const [importResult, setImportResult] = useState(null);
  const [importLoading, setImportLoading] = useState(false);
  const [activeTab, setActiveTab] = useState("chat");
  const [pendingActions, setPendingActions] = useState([]);
  const [appliedCount, setAppliedCount] = useState(0);
  const messagesEndRef = React.useRef(null);
  const fileInputRef = React.useRef(null);
  const importFileRef = React.useRef(null);

  React.useEffect(() => { messagesEndRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages, loading]);

  const toBase64 = file => new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});

  // Build platform context snapshot
  const getPlatformContext = () => {
    const products = store.get("znn_products")||[];
    const customers = store.get("znn_customers")||[];
    const proformas = store.get("znn_proformas")||[];
    const personel = store.get("znn_personel")||[];
    const projeler = store.get("znn_projeler")||[];
    const giderler = store.get("znn_giderler")||[];
    const islemler = store.get("znn_islemler")||[];
    const hedefler = store.get("znn_hedefler")||[];
    const hatirlaticilar = store.get("znn_hatirlatici")||[];
    const tedairkci = store.get("znn_tedairkci")||[];

    const totalSales = proformas.filter(p=>p.status==="Onaylandı").reduce((s,p)=>{
      const sub=p.items.reduce((x,i)=>x+i.price*i.qty,0);
      return s+sub*(1-p.discount/100)*(1+p.vat/100);
    },0);
    const totalGider = giderler.filter(g=>g.paid).reduce((s,g)=>s+g.amount,0);

    return `PLATFORM VERİSİ (${new Date().toLocaleDateString("tr-TR")}):
Ürünler: ${products.length} adet | Toplam stok değeri: ${products.reduce((s,p)=>s+p.stock*p.price,0).toLocaleString("tr-TR")} TL
Müşteriler: ${customers.length} kişi/firma
Proformalar: ${proformas.length} adet | Onaylı: ${proformas.filter(p=>p.status==="Onaylandı").length} | Bekleyen: ${proformas.filter(p=>p.status==="Beklemede").length}
Ciro (onaylı): ${totalSales.toLocaleString("tr-TR")} TL | Gider: ${totalGider.toLocaleString("tr-TR")} TL | Kar: ${(totalSales-totalGider).toLocaleString("tr-TR")} TL
Personel: ${personel.length} kişi | Aktif: ${personel.filter(p=>p.status==="Aktif").length}
Projeler: ${projeler.length} | Devam eden: ${projeler.filter(p=>p.status==="Devam Ediyor").length}
Tedarikçiler: ${tedairkci.length} | Aktif: ${tedairkci.filter(t=>t.status==="Aktif").length}
Hedefler: ${hedefler.filter(h=>h.status==="Devam Ediyor").length} aktif hedef
Acil hatırlatıcılar: ${hatirlaticilar.filter(h=>!h.done&&h.date<=new Date().toISOString().split("T")[0]).length} adet

ÜRÜNLER: ${JSON.stringify(products.map(p=>({id:p.id,name:p.name,cat:p.category,price:p.price,stock:p.stock})))}
MÜŞTERİLER: ${JSON.stringify(customers.map(c=>({id:c.id,name:c.name,email:c.email,city:c.city})))}
PROFORMALAR: ${JSON.stringify(proformas.map(p=>({id:p.id,customer:p.customer,status:p.status,date:p.date})))}
PROJEler: ${JSON.stringify(projeler.map(p=>({name:p.name,client:p.client,budget:p.budget,spent:p.spent,status:p.status})))}
HEDEFLER: ${JSON.stringify(hedefler.map(h=>({title:h.title,target:h.target,current:h.current,unit:h.unit})))}
SON İŞLEMLER: ${JSON.stringify(islemler.slice(0,6))}`;
  };

  // Parse platform actions from AI response
  const extractActions = (text) => {
    const actions = [];
    const regex = /```platform-action\s*([\s\S]*?)```/g;
    let match;
    while ((match = regex.exec(text)) !== null) {
      try {
        const parsed = JSON.parse(match[1].trim());
        actions.push(parsed);
      } catch(e) {}
    }
    return actions;
  };

  const cleanText = (text) => text.replace(/```platform-action[\s\S]*?```/g, "").trim();

  // Apply a single platform action
  const applyAction = (action) => {
    const {action:type, data, actions:batchActions} = action;
    let count = 0;

    const doOne = (t, d) => {
      if (t === "ADD_CUSTOMER") {
        const newCust = {...d, id:Math.floor(Date.now()+Math.random()*999), avatar:d.name?.[0]||"?"};
        const ex = store.get("znn_customers")||[];
        store.set("znn_customers", [...ex, newCust]);
        store.push("znn_customers", newCust);
        count++;
      } else if (t === "ADD_PRODUCT") {
        const newProd = {...d, id:Math.floor(Date.now()+Math.random()*999), emoji:"🛋️", price:+(d.price||0), cost:+(d.cost||0), stock:+(d.stock||0)};
        const ex = store.get("znn_products")||[];
        store.set("znn_products", [...ex, newProd]);
        store.push("znn_products", newProd);
        count++;
      } else if (t === "ADD_REMINDER") {
        const ex = store.get("znn_hatirlatici")||[];
        store.set("znn_hatirlatici", [...ex, {...d, id:Date.now()+Math.random(), done:false}]);
        count++;
      } else if (t === "ADD_NOTE") {
        const ex = store.get("znn_notlar")||[];
        const dt = new Date().toISOString().split("T")[0];
        store.set("znn_notlar", [{...d, id:Date.now()+Math.random(), date:dt}, ...ex]);
        count++;
      } else if (t === "ADD_EXPENSE") {
        const ex = store.get("znn_giderler")||[];
        store.set("znn_giderler", [...ex, {...d, id:Date.now()+Math.random(), amount:+(d.amount||0)}]);
        count++;
      } else if (t === "ADD_TRANSACTION") {
        const ex = store.get("znn_islemler")||[];
        store.set("znn_islemler", [{...d, id:Date.now()+Math.random(), amount:+(d.amount||0)}, ...ex]);
        count++;
      } else if (t === "ADD_PROFORMA_ITEMS") {
        const items = Array.isArray(d) ? d : [d];
        store.set("znn_import_items", items.map(i=>({...i, qty:+(i.qty||1), price:+(i.price||0)})));
        count++;
      }
    };

    if (type === "BATCH" && Array.isArray(batchActions)) {
      batchActions.forEach(a => doOne(a.action, a.data));
    } else {
      doOne(type, data);
    }
    return count;
  };

  const applyAllPending = () => {
    let total = 0;
    pendingActions.forEach(a => { total += applyAction(a); });
    setAppliedCount(c => c + total);
    setPendingActions([]);
    const confirmMsg = {role:"assistant", content:`✅ **${total} işlem uygulandı!** Platform güncellendi.\n\nDeğişiklikleri görmek için ilgili modüle gidin. Başka bir şey yapayım mı?`, actions:[]};
    const updated = [...messages, confirmMsg];
    setMessages(updated);
    store.set("znn_ai_history", updated.slice(-50));
  };

  const handleFile = async e => {
    const f = e.target.files[0];
    if (!f) return;
    setFile(f);
    if (f.type.startsWith("image/")) {
      const reader = new FileReader();
      reader.onload = ev => setFilePreview({type:"image", data:ev.target.result, name:f.name});
      reader.readAsDataURL(f);
    } else {
      setFilePreview({type:"doc", name:f.name, size:(f.size/1024).toFixed(1)+"KB"});
    }
  };

  const send = async (overrideInput) => {
    const txt = overrideInput !== undefined ? overrideInput : input;
    if (!txt.trim() && !file) return;

    const userContent = [];
    let fileRef = file;

    if (fileRef) {
      if (fileRef.type.startsWith("image/")) {
        const b64 = await toBase64(fileRef);
        userContent.push({type:"image", source:{type:"base64", media_type:fileRef.type, data:b64}});
      } else if (fileRef.type === "application/pdf") {
        const b64 = await toBase64(fileRef);
        userContent.push({type:"document", source:{type:"base64", media_type:"application/pdf", data:b64}});
      }
    }
    if (txt.trim()) userContent.push({type:"text", text:txt});
    if (!userContent.length) return;

    const displayText = fileRef ? `📎 ${fileRef.name}${txt ? "\n"+txt : ""}` : txt;
    const userMsg = {role:"user", content:displayText, actions:[]};
    const newMsgs = [...messages, userMsg];
    setMessages(newMsgs);
    setInput(""); setFile(null); setFilePreview(null);
    setLoading(true);

    // Build API messages with platform context injected as system addition
    const platformCtx = getPlatformContext();
    const apiSystem = AI_SYSTEM + "\n\n" + platformCtx;

    // Build clean message history for API (only role + string content)
    const historyForApi = newMsgs.slice(-12).map(m => ({
      role: m.role,
      content: typeof m.content === "string" ? m.content : (Array.isArray(m.content) ? JSON.stringify(m.content) : String(m.content||""))
    }));
    // Replace last user message with actual content (may include file/image)
    historyForApi[historyForApi.length-1] = {
      role: "user",
      content: userContent.length===1 && userContent[0].type==="text" ? userContent[0].text : userContent
    };

    try {
      const resp = await anthropicFetch({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2500,
          system: apiSystem,
          messages: historyForApi
        });
      if (!resp.ok) {
        const err = await resp.json().catch(()=>({}));
        throw new Error(`API ${resp.status}: ${err?.error?.message||resp.statusText}`);
      }
      const data = await resp.json();
      if (data.error) throw new Error(data.error.message);

      const rawText = data.content?.map(c=>c.text||"").join("") || "Yanıt alınamadı.";
      const extractedActions = extractActions(rawText);
      const displayText2 = cleanText(rawText);

      if (extractedActions.length > 0) {
        setPendingActions(extractedActions);
      }

      const aiMsg = {role:"assistant", content:displayText2, actions:extractedActions};
      const updated = [...newMsgs, aiMsg];
      setMessages(updated);
      store.set("znn_ai_history", updated.slice(-50));
    } catch(e) {
      console.error(e);
      const errMsg = {role:"assistant", content:`⚠️ **Hata:** ${e.message}\n\nLütfen tekrar deneyin.`, actions:[]};
      setMessages(m=>[...m, errMsg]);
    }
    setLoading(false);
  };

  const handleImportFile = async e => {
    const f = e.target.files[0];
    if (!f) return;
    setImportLoading(true);
    setImportResult(null);

    const PROMPT = `Bu dosyayı analiz et ve Zenniva platformu için veri çıkar.
Kategori seç: "proforma_items", "customers", "products", "transactions"
SADECE geçerli JSON döndür:
proforma_items: {"type":"proforma_items","data":[{"name":"","qty":1,"price":0,"unit":"Adet"}]}
customers: {"type":"customers","data":[{"name":"","email":"","phone":"","city":"","company":""}]}
products: {"type":"products","data":[{"name":"","category":"","price":0,"cost":0,"stock":0,"unit":"Adet","sku":""}]}
transactions: {"type":"transactions","data":[{"date":"","desc":"","type":"Gelir","amount":0,"category":"Satış"}]}
Veri yoksa: {"type":"unknown","data":[],"message":"açıklama"}`;

    let msg_content = [];
    try {
      const fn = f.name.toLowerCase();
      if (f.type.startsWith("image/")) {
        const b64 = await toBase64(f);
        msg_content = [{type:"image",source:{type:"base64",media_type:f.type,data:b64}},{type:"text",text:PROMPT}];
      } else if (f.type==="application/pdf") {
        const b64 = await toBase64(f);
        msg_content = [{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:PROMPT}];
      } else {
        const rawText = await new Promise((res,rej)=>{
          const reader = new FileReader();
          reader.onload = ev => {
            if (fn.endsWith(".csv") || fn.endsWith(".txt")) {
              const dec = new TextDecoder("utf-8");
              try { res(dec.decode(new Uint8Array(ev.target.result)).substring(0,8000)); } catch(e) { res(""); }
            } else {
              const bytes = new Uint8Array(ev.target.result);
              let raw = "";
              for (let i=0;i<Math.min(bytes.length,60000);i++) {
                const ch=bytes[i];
                if(ch>=32&&ch<127) raw+=String.fromCharCode(ch);
                else if(ch===9||ch===10||ch===13) raw+=" ";
              }
              res(raw.replace(/\s{4,}/g," | ").substring(0,8000));
            }
          };
          reader.onerror=rej;
          reader.readAsArrayBuffer(f);
        });
        msg_content = [{type:"text",text:`Dosya: ${f.name}\nİçerik:\n${rawText}\n\n${PROMPT}`}];
      }

      const resp = await anthropicFetch({model:"claude-sonnet-4-20250514",max_tokens:3000,messages:[{role:"user",content:msg_content}]});
      if (!resp.ok) { const e=await resp.json().catch(()=>({})); throw new Error(`API ${resp.status}: ${e?.error?.message||resp.statusText}`); }
      const data = await resp.json();
      const rawRes = data.content?.map(c=>c.text||"").join("").trim()||"{}";
      const clean = rawRes.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
      let parsed;
      try { parsed=JSON.parse(clean); }
      catch(pe) { const m=clean.match(/\{[\s\S]*\}/); parsed=m?JSON.parse(m[0]):{type:"unknown",data:[],message:"JSON parse hatası: "+clean.substring(0,100)}; }
      setImportResult(parsed);
    } catch(e) {
      setImportResult({error:e.message});
    }
    setImportLoading(false);
    if (importFileRef.current) importFileRef.current.value="";
  };

  const applyImport = () => {
    if (!importResult||importResult.error) return;
    const {type,data} = importResult;
    let msg = "";
    if (type==="customers") {
      const ex=store.get("znn_customers")||[];
      store.set("znn_customers",[...ex,...data.map((c,i)=>({...c,id:Date.now()+i,avatar:c.name?.[0]||"?"}))]);
      msg=`✅ ${data.length} müşteri eklendi!`;
    } else if (type==="products") {
      const ex=store.get("znn_products")||[];
      store.set("znn_products",[...ex,...data.map((p,i)=>({...p,id:Date.now()+i,emoji:"🛋️",price:+(p.price||0),cost:+(p.cost||0),stock:+(p.stock||0)}))]);
      msg=`✅ ${data.length} ürün eklendi!`;
    } else if (type==="proforma_items") {
      store.set("znn_import_items",data.map(i=>({...i,qty:+(i.qty||1),price:+(i.price||0)})));
      msg=`✅ ${data.length} kalem hazırlandı! Proforma > AI'dan Aktar butonu kullanın.`;
    } else if (type==="transactions") {
      const ex=store.get("znn_islemler")||[];
      store.set("znn_islemler",[...data.map((t,i)=>({...t,id:Date.now()+i,amount:+(t.amount||0),account:t.account||"Ziraat Bankası"})),...ex]);
      msg=`✅ ${data.length} işlem eklendi!`;

  const renderMarkdown = text => text
    .replace(/\*\*(.+?)\*\*/g,"<strong style='color:#3a2a18'>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/`(.+?)`/g,"<code style='background:#f5f0e8;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12px;color:#b8935a'>$1</code>")
    .replace(/^- (.+)$/gm,"<div style='padding:2px 0 2px 14px;border-left:2px solid #b8935a44;margin:2px 0;color:#5a4e42'>$1</div>")
    .replace(/^(\d+)\. (.+)$/gm,"<div style='padding:2px 0 2px 14px;margin:2px 0'><span style='color:#b8935a;font-weight:600;margin-right:6px'>$1.</span>$2</div>")
    .replace(/\n\n/g,"<br/><br/>")

  const ACTION_LABELS = {
    ADD_CUSTOMER:"Müşteri Ekle", ADD_PRODUCT:"Ürün Ekle", ADD_REMINDER:"Hatırlatıcı Ekle",
    ADD_NOTE:"Not Ekle", ADD_EXPENSE:"Gider Ekle", ADD_TRANSACTION:"İşlem Ekle",
    ADD_PROFORMA_ITEMS:"Proforma Kalemleri", BATCH:"Toplu İşlem"
  };

  const QUICK_PROMPTS = [
    {label:"📊 Platform Özeti", text:"Platform verilerini analiz et, satış durumu, stok seviyeleri ve finansal performans hakkında detaylı özet çıkar"},
    {label:"⚠️ Kritik Uyarılar", text:"Stok kritik seviyelerde olan ürünler, gecikmiş ödemeler, yaklaşan vadeler hakkında uyarıları listele"},
    {label:"💡 Satış Stratejisi", text:"Mevcut müşteri ve ürün verilerine bakarak bu ay için satış stratejisi öner"},
    {label:"📧 Müşteri E-postası", text:"Bekleyen proformaları olan müşterilere gönderilecek takip e-postası yaz"},
    {label:"🛋️ Yeni Ürün Ekle", text:"Yeni bir ürün eklemek istiyorum, hangi kategoride ne tür bir ürün önerirsin? Uygun fiyat ve SKU ile platforma ekle"},
    {label:"📅 Hatırlatıcı Ekle", text:"Bu hafta için önemli iş hatırlatıcıları ekle: maaş, stok sayımı, müşteri takibi"},
    {label:"📋 Aylık Rapor", text:"Bu ay için özet rapor hazırla: gelir, gider, kar, en çok satan ürünler, yeni müşteriler"},
    {label:"🔍 Fırsatlar", text:"Platforma bakarak büyüme fırsatları ve iyileştirme önerileri listele"},
  ];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 110px)",gap:0}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,#b8935a,#7a5030)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🤖</div>
          <div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:"#3a2a18"}}>Zenniva AI Asistan</div>
            <div style={{fontSize:10,color:"#3a9a5a",fontWeight:600,letterSpacing:.5}}>● Platform verilerine tam erişim aktif</div>
          </div>
        </div>
        <div style={{display:"flex",gap:7}}>
          <button className="bg" style={{fontSize:11}} onClick={()=>setShowImportModal(true)}>📂 Dosya Analizi</button>
          <button className="bg" style={{fontSize:11}} onClick={()=>{setMessages([{role:"assistant",content:"Konuşma sıfırlandı. Platform verilerine erişimim aktif, nasıl yardımcı olabilirim?",actions:[]}]);store.set("znn_ai_history",[]);setPendingActions([]);}}>🗑 Temizle</button>
        </div>
      </div>

      {/* Pending actions bar */}
      {pendingActions.length > 0 && (
        <div style={{background:"linear-gradient(135deg,rgba(74,161,106,.08),rgba(74,161,106,.04))",border:"1px solid rgba(74,161,106,.25)",borderRadius:9,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <span style={{fontSize:18}}>⚡</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:"#3a9a5a",marginBottom:2}}>{pendingActions.length} platform işlemi hazır</div>
            <div style={{fontSize:11,color:"#6a8a6a"}}>
              {pendingActions.map((a,i)=><span key={i} style={{marginRight:8,background:"rgba(74,161,106,.12)",padding:"1px 8px",borderRadius:10,fontSize:10.5}}>{ACTION_LABELS[a.action]||a.action}</span>)}
            </div>
          </div>
          <button className="bp" style={{fontSize:11,padding:"6px 14px",background:"#3a9a5a",borderColor:"#3a9a5a"}} onClick={applyAllPending}>✅ Uygula</button>
          <button className="bg" style={{fontSize:11}} onClick={()=>setPendingActions([])}>✕</button>
        </div>
      )}

      {/* Quick prompts */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10,flexShrink:0}}>
        {QUICK_PROMPTS.map(q=>(
          <div key={q.label} onClick={()=>send(q.text)} style={{fontSize:10.5,padding:"5px 11px",borderRadius:20,background:"#faf8f4",border:"1px solid #e8e2d8",color:"#6b5d4f",cursor:"pointer",transition:"all .15s",whiteSpace:"nowrap"}}

                <div style={{display:"flex",gap:8}}>
                  <button className="bp" style={{flex:1,padding:"10px"}} onClick={applyImport}>✅ Platforma Aktar</button>
                  <button className="bg" onClick={()=>{setImportResult(null);setTimeout(()=>importFileRef.current?.click(),100);}}>Başka Dosya</button>
                  <button className="bg" onClick={()=>{setShowImportModal(false);setImportResult(null);}}>Kapat</button>
                </div>
              </div>
            )}

            {importResult?.type==="unknown" && (
              <div style={{padding:"16px",background:"rgba(184,147,90,.08)",border:"1px solid rgba(184,147,90,.2)",borderRadius:8,marginBottom:14}}>
                <div style={{color:"#b8935a",fontWeight:600,marginBottom:6}}>Veri tespit edilemedi</div>

                <button className="bg" style={{marginTop:10}} onClick={()=>{setImportResult(null);setTimeout(()=>importFileRef.current?.click(),100);}}>Başka Dosya Dene</button>

            {importResult?.error && (
              <div style={{padding:"16px",background:"rgba(192,64,64,.08)",border:"1px solid rgba(192,64,64,.2)",borderRadius:8,marginBottom:14}}>

                <button className="bg" style={{marginTop:10}} onClick={()=>{setImportResult(null);}}>Tekrar Dene</button>

      )}

      <style>{`@keyframes aipulse{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-4px);opacity:1}}`}</style>
    </div>
  );
}

function Render3DModule({store}) {
  const [loaded, setLoaded] = React.useState(false);
  const [mod3d, setMod3d] = React.useState(null);

  const load = async () => {
    setLoaded(true);
    // Dynamically inject the 3D module
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
    document.head.appendChild(s);
    await new Promise(r => { s.onload=r; s.onerror=r; });
    setMod3d('ready');
  };

  if (!loaded) return (
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div style={{fontSize:48,marginBottom:16}}>🏠</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"#7a5030",marginBottom:8}}>3D Oda Tasarımı</div>
      <div style={{fontSize:13,color:"#a09080",marginBottom:24}}>Three.js tabanlı 3D render motoru</div>
      <button className="bp" style={{padding:"12px 32px",fontSize:13}} onClick={load}>🚀 3D Modülü Yükle</button>
    </div>
  );

  return (
    <div style={{textAlign:"center",padding:"40px 20px"}}>
      <div style={{fontSize:40,marginBottom:12}}>⏳</div>
      <div style={{fontSize:13,color:"#a09080"}}>3D modül yükleniyor... Lütfen bekleyin.</div>
      {mod3d==='ready' && <div style={{color:"#3a9a5a",marginTop:12}}>✅ Hazır — Sayfayı yenileyin ve tekrar açın.</div>}
    </div>
  );
}
