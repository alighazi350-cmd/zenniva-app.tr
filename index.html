    subtitle: "Furniture · Design · Living",
    year: new Date().getFullYear().toString(),
    intro: "Premium mobilya tasarımlarımızı keşfedin. Her ürün, kaliteli malzeme ve özgün tasarımın buluşmasıyla yaratılmaktadır.",
    primaryColor: "#1c2b3a",
    accentColor: "#b8935a",
    showPrices: true,
    layout: "2col",
    contactInfo: "Nilüfer / Bursa · +90 552 390 42 34 · info@zenniva.com.tr"
  });
  const [mode, setMode] = useState("list");
  const [aiLoading, setAiLoading] = useState(false);
  const [newItem, setNewItem] = useState({name:"",category:"",description:"",price:"",unit:"Adet",imageData:null,imageName:""});
  const [editId, setEditId] = useState(null);
  const [pdfLoading, setPdfLoading] = useState(false);
  const [batchQueue, setBatchQueue] = useState([]);
  const [batchProcessing, setBatchProcessing] = useState(false);
  const [batchProgress, setBatchProgress] = useState(0);
  const singleFileRef = React.useRef(null);
  const batchFileRef = React.useRef(null);

  const toBase64 = f => new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(f);
  });

  const toBase64Raw = f => new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(f);
  });

  // AI analyze single image
  const analyzeWithAI = async (b64raw, mediaType) => {
    try {
      const resp = await anthropicFetch({
          model: "claude-sonnet-4-20250514",
          max_tokens: 400,
          messages: [{role:"user", content: [
            {type:"image", source:{type:"base64", media_type:mediaType, data:b64raw}},
            {type:"text", text:`Bu mobilya/ürün fotoğrafını analiz et. SADECE JSON döndür:
{"name":"Ürün adı (Türkçe, kısa ve profesyonel, max 5 kelime)","category":"Oturma Odası veya Yemek Odası veya Yatak Odası veya Salon veya Çalışma Odası","description":"2-3 cümle profesyonel Türkçe açıklama (malzeme, tasarım özellikleri)"}`}
          ]}]
        });
      if (!resp.ok) return null;
      const data = await resp.json();
      const raw = data.content?.[0]?.text?.trim() || "{}";
      const clean = raw.replace(/```json\s*/g,"").replace(/```/g,"").trim();
      const m = clean.match(/\{[\s\S]*\}/);
      return m ? JSON.parse(m[0]) : null;
    } catch(e) { return null; }
  };

  // Single file upload + AI analyze
  const handleSingleImage = async e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > 8*1024*1024) { alert("Fotoğraf 8MB'dan küçük olmalı"); return; }
    setAiLoading(true);
    const b64full = await toBase64(f);
    const b64raw = b64full.split(",")[1];
    const ai = await analyzeWithAI(b64raw, f.type);
    setNewItem(p => ({
      ...p,
      imageData: b64full,
      imageName: f.name,
      name: ai?.name || p.name,
      category: ai?.category || p.category,
      description: ai?.description || p.description
    }));
    setAiLoading(false);
    if (singleFileRef.current) singleFileRef.current.value = "";
  };

  // Batch file upload
  const handleBatchUpload = async e => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    setBatchProcessing(true);
    setBatchProgress(0);
    setBatchQueue([]);
    const results = [];
    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      setBatchProgress(Math.round(((i) / files.length) * 100));
      try {
        const b64full = await toBase64(f);
        const b64raw = b64full.split(",")[1];
        const ai = await analyzeWithAI(b64raw, f.type);
        results.push({
          id: Date.now() + i,
          imageData: b64full,
          imageName: f.name,
          name: ai?.name || f.name.replace(/\.[^/.]+$/,""),
          category: ai?.category || "Diğer",
          description: ai?.description || "",
          price: "",
          unit: "Adet",
          selected: true
        });
      } catch(err) {
        results.push({
          id: Date.now() + i,
          imageData: null,
          imageName: f.name,
          name: f.name.replace(/\.[^/.]+$/,""),
          category: "Diğer",
          description: "",
          price: "",
          unit: "Adet",
          selected: false,
          error: true
        });
      }
      setBatchProgress(Math.round(((i+1) / files.length) * 100));
    }
    setBatchQueue(results);
    setBatchProcessing(false);
    if (batchFileRef.current) batchFileRef.current.value = "";
  };

  const saveBatch = () => {
    const toAdd = batchQueue.filter(i => i.selected && i.imageData).map(i => ({
      id: Date.now() + Math.random(),
      imageData: i.imageData,
      imageName: i.imageName,
      name: i.name,
      category: i.category,
      description: i.description,
      price: parseFloat(i.price) || 0,
      unit: i.unit || "Adet"
    }));
    if (!toAdd.length) { alert("En az 1 ürün seçin"); return; }
    const updated = [...katalogItems, ...toAdd];
    setKatalogItems(updated);
    store.set("znn_katalog_items", updated);
    setBatchQueue([]);
    setMode("list");
  };

  const saveItem = () => {
    if (!newItem.name || !newItem.imageData) { alert("Fotoğraf ve ürün adı zorunlu"); return; }
    const item = {...newItem, id: editId || Date.now(), price: parseFloat(newItem.price)||0};
    const updated = editId ? katalogItems.map(x => x.id===editId ? item : x) : [...katalogItems, item];
    setKatalogItems(updated);
    store.set("znn_katalog_items", updated);
    setNewItem({name:"",category:"",description:"",price:"",unit:"Adet",imageData:null,imageName:""});
    setEditId(null);
    setMode("list");
  };

  const deleteItem = id => {
    if (!window.confirm("Bu ürünü katalogdan sil?")) return;
    const updated = katalogItems.filter(x => x.id !== id);
    setKatalogItems(updated);
    store.set("znn_katalog_items", updated);
  };

  const startEdit = item => {
    setNewItem({...item, price: String(item.price)});
    setEditId(item.id);
    setMode("addItem");
  };

  const saveSettings = () => {
    store.set("znn_katalog_settings", settings);
    setMode("list");
  };

  // ── PDF GENERATION ───────────────────────────────────────────────────────────
  const toJpegBase64 = (dataUrl) => new Promise((res) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      // Max 1200px for PDF quality/size balance
      const maxW = 1200;
      const scale = img.width > maxW ? maxW / img.width : 1;
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      res(canvas.toDataURL("image/jpeg", 0.82));
    };
    img.onerror = () => res(null);
    img.src = dataUrl;
  });

  const hexRGB = (hex) => {
    const h = hex.replace("#","");
    return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
  };

  const generateKatalogPDF = async () => {
    if (katalogItems.length === 0) { alert("Önce ürün ekleyin"); return; }
    setPdfLoading(true);
    try {
      // Load jsPDF
      if (!window.jspdf) {
        await new Promise((res, rej) => {
          const s = document.createElement("script");
          s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
          s.onload = res; s.onerror = () => rej(new Error("jsPDF yüklenemedi. İnternet bağlantınızı kontrol edin."));
          document.head.appendChild(s);
        });
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
      const W = 210, H = 297;
      const [pr,pg,pb] = hexRGB(settings.primaryColor);
      const [ar,ag,ab] = hexRGB(settings.accentColor);
      const fmtPrice = n => n > 0 ? new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(n) : "";

      // Pre-convert all images to JPEG via canvas
      const jpegImages = {};
      for (const item of katalogItems) {
        if (item.imageData) {
          const j = await toJpegBase64(item.imageData);
          if (j) jpegImages[item.id] = j.split(",")[1];
        }
      }

      const addImg = (id, x, y, w, h) => {
        const data = jpegImages[id];
        if (!data) {
          doc.setFillColor(240,235,225);
          doc.rect(x, y, w, h, "F");
          return;
        }
        try { doc.addImage(data, "JPEG", x, y, w, h); }
        catch(e) {
          doc.setFillColor(240,235,225);
          doc.rect(x, y, w, h, "F");
        }
      };

      // ── KAPAK ──────────────────────────────────────────────────────────────
      doc.setFillColor(pr,pg,pb);
      doc.rect(0, 0, W, H, "F");

      // Çerçeve
      doc.setDrawColor(ar,ag,ab); doc.setLineWidth(0.5);
      doc.rect(8, 8, W-16, H-16);
      doc.setLineWidth(0.15);
      doc.rect(11, 11, W-22, H-22);

      // Köşe çizgileri
      doc.setLineWidth(1.5); doc.setDrawColor(ar,ag,ab);
      [[8,8,22,8],[8,8,8,22],[W-8,8,W-22,8],[W-8,8,W-8,22],
       [8,H-8,22,H-8],[8,H-8,8,H-22],[W-8,H-8,W-22,H-8],[W-8,H-8,W-8,H-22]]
        .forEach(([x1,y1,x2,y2]) => doc.line(x1,y1,x2,y2));

      // Marka
      doc.setFont("helvetica","bold");
      doc.setFontSize(38); doc.setTextColor(ar,ag,ab);
      doc.text("ZENNIVA", W/2, 118, {align:"center", charSpace:8});

      doc.setLineWidth(0.6); doc.setDrawColor(ar,ag,ab);
      doc.line(W/2-28, 125, W/2+28, 125);

      doc.setFont("helvetica","normal");
      doc.setFontSize(8); doc.setTextColor(ar,ag,ab);
      doc.text(settings.subtitle.toUpperCase(), W/2, 133, {align:"center", charSpace:3});

      doc.setFontSize(13); doc.setTextColor(255,255,255);
      doc.text(settings.title.toUpperCase(), W/2, 150, {align:"center", charSpace:1.5});

      doc.setFontSize(9); doc.setTextColor(ar,ag,ab);
      doc.text(settings.year, W/2, 161, {align:"center", charSpace:4});

      if (settings.intro) {
        doc.setFontSize(8.5); doc.setFont("helvetica","italic");
        doc.setTextColor(180,170,155);
        const lines = doc.splitTextToSize(settings.intro, 140);
        let iy = 185;
        lines.slice(0,4).forEach(l => { doc.text(l, W/2, iy, {align:"center"}); iy += 7; });
      }

      // Alt bilgi
      doc.setFillColor(ar,ag,ab);
      doc.setGState && doc.setGState(new doc.GState({opacity:0.15}));
      doc.rect(8, H-28, W-16, 16, "F");
      doc.setGState && doc.setGState(new doc.GState({opacity:1}));
      doc.setFontSize(7.5); doc.setFont("helvetica","normal");
      doc.setTextColor(ar,ag,ab);
      doc.text(settings.contactInfo, W/2, H-18, {align:"center", charSpace:0.5});

      // ── ÜRÜN SAYFALARI ─────────────────────────────────────────────────────
      const is2col = settings.layout === "2col";

      if (is2col) {
        for (let i = 0; i < katalogItems.length; i += 2) {
          doc.addPage();
          const group = katalogItems.slice(i, i+2);
          const cols = group.length;

          // Header
          doc.setFillColor(pr,pg,pb);
          doc.rect(0, 0, W, 13, "F");
          doc.setFontSize(7); doc.setFont("helvetica","bold");
          doc.setTextColor(ar,ag,ab);
          doc.text("ZENNIVA", 8, 8.5, {charSpace:3});
          doc.setFont("helvetica","normal"); doc.setTextColor(255,255,255);
          doc.text((group[0]?.category||"").toUpperCase(), W/2, 8.5, {align:"center"});
          doc.text(String(Math.floor(i/2)+1), W-8, 8.5, {align:"right"});

          if (cols > 1) {
            doc.setDrawColor(220,215,205); doc.setLineWidth(0.3);
            doc.line(W/2, 13, W/2, H-5);
          }

          group.forEach((item, col) => {
            const xOff = col * (W/2);
            const colW = cols===1 ? W : W/2;
            const pad = 7;

            // Fotoğraf
            addImg(item.id, xOff+2, 16, colW-4, 95);

            // Altın çizgi
            doc.setFillColor(ar,ag,ab);
            doc.rect(xOff+2, 111, colW-4, 1.2, "F");

            let y = 118;
            // Kategori
            doc.setFontSize(6.5); doc.setFont("helvetica","bold");
            doc.setTextColor(ar,ag,ab);
            doc.text((item.category||"").toUpperCase(), xOff+pad, y, {charSpace:1.5});
            y += 7;

            // İsim
            doc.setFontSize(13); doc.setFont("helvetica","bold");
            doc.setTextColor(28,22,14);
            const nameLines = doc.splitTextToSize(item.name, colW-14);
            doc.text(nameLines.slice(0,2), xOff+pad, y);
            y += Math.min(nameLines.length,2) * 6.5 + 4;

            // İnce çizgi
            doc.setDrawColor(ar,ag,ab); doc.setLineWidth(0.6);
            doc.line(xOff+pad, y, xOff+pad+16, y);
            y += 6;

            // Açıklama
            if (item.description) {
              doc.setFontSize(7.5); doc.setFont("helvetica","normal");
              doc.setTextColor(95,85,72);
              const descLines = doc.splitTextToSize(item.description, colW-14);
              doc.text(descLines.slice(0,5), xOff+pad, y, {lineHeightFactor:1.75});
              y += Math.min(descLines.length,5) * 5.8 + 5;
            }

            // Fiyat
            if (settings.showPrices && item.price > 0) {
              doc.setFillColor(248,245,240);
              doc.setDrawColor(225,218,208); doc.setLineWidth(0.25);
              doc.roundedRect(xOff+pad, y, colW-16, 13, 2, 2, "FD");
              doc.setFontSize(12); doc.setFont("helvetica","bold");
              doc.setTextColor(ar,ag,ab);
              doc.text(fmtPrice(item.price), xOff+pad+4, y+9);
              doc.setFontSize(6.5); doc.setFont("helvetica","normal");
              doc.setTextColor(150,140,128);
              doc.text("/ "+(item.unit||"Adet"), xOff+pad+4+doc.getTextWidth(fmtPrice(item.price))+1, y+9);
            }
          });

          // Alt çizgi
          doc.setFillColor(ar,ag,ab);
          doc.rect(0, H-2.5, W, 2.5, "F");
        }

      } else {
        for (let i = 0; i < katalogItems.length; i++) {
          doc.addPage();
          const item = katalogItems[i];

          // Header
          doc.setFillColor(pr,pg,pb);
          doc.rect(0, 0, W, 13, "F");
          doc.setFontSize(7); doc.setFont("helvetica","bold");
          doc.setTextColor(ar,ag,ab);
          doc.text("ZENNIVA", 8, 8.5, {charSpace:3});
          doc.setFont("helvetica","normal"); doc.setTextColor(255,255,255);
          doc.text((item.category||"").toUpperCase(), W/2, 8.5, {align:"center"});
          doc.text(String(i+1).padStart(2,"0"), W-8, 8.5, {align:"right"});

          // Sol: fotoğraf
          const imgW = 108;
          addImg(item.id, 0, 13, imgW, H-16);

          // Dikey ayırıcı
          doc.setDrawColor(232,226,216); doc.setLineWidth(0.3);
          doc.line(imgW, 13, imgW, H-3);

          // Sağ: içerik
          const rx = imgW+8, rw = W-imgW-12;
          let y = 42;

          doc.setFontSize(7); doc.setFont("helvetica","bold");
          doc.setTextColor(ar,ag,ab);
          doc.text((item.category||"").toUpperCase(), rx, y, {charSpace:2});
          y += 12;

          doc.setFontSize(17); doc.setFont("helvetica","bold");
          doc.setTextColor(26,20,12);
          const nameLines = doc.splitTextToSize(item.name, rw);
          doc.text(nameLines.slice(0,3), rx, y);
          y += Math.min(nameLines.length,3)*8 + 8;

          doc.setDrawColor(ar,ag,ab); doc.setLineWidth(1.2);
          doc.line(rx, y, rx+22, y);
          y += 10;

          if (item.description) {
            doc.setFontSize(9); doc.setFont("helvetica","normal");
            doc.setTextColor(88,78,66);
            const descLines = doc.splitTextToSize(item.description, rw);
            doc.text(descLines.slice(0,6), rx, y, {lineHeightFactor:1.85});
            y += Math.min(descLines.length,6)*7.5 + 14;
          }

          if (settings.showPrices && item.price > 0) {
            doc.setFillColor(248,245,240);
            doc.setDrawColor(225,218,208); doc.setLineWidth(0.35);
            doc.roundedRect(rx, y, rw, 20, 3, 3, "FD");
            doc.setFontSize(7.5); doc.setFont("helvetica","normal");
            doc.setTextColor(155,145,132);
            doc.text("FİYAT", rx+6, y+7, {charSpace:1.5});
            doc.setFontSize(15); doc.setFont("helvetica","bold");
            doc.setTextColor(ar,ag,ab);
            doc.text(fmtPrice(item.price), rx+6, y+16);
            doc.setFontSize(7.5); doc.setFont("helvetica","normal");
            doc.setTextColor(155,145,132);
            doc.text("/ "+(item.unit||"Adet"), rx+6+doc.getTextWidth(fmtPrice(item.price))+2, y+16);
          }

          doc.setFillColor(ar,ag,ab);
          doc.rect(0, H-2.5, W, 2.5, "F");
        }
      }

      // ── ARKA KAPAK ─────────────────────────────────────────────────────────
      doc.addPage();
      doc.setFillColor(pr,pg,pb);
      doc.rect(0, 0, W, H, "F");
      doc.setDrawColor(ar,ag,ab); doc.setLineWidth(0.5);
      doc.rect(8, 8, W-16, H-16);
      doc.setLineWidth(1.5);
      [[8,8,22,8],[8,8,8,22],[W-8,8,W-22,8],[W-8,8,W-8,22],
       [8,H-8,22,H-8],[8,H-8,8,H-22],[W-8,H-8,W-22,H-8],[W-8,H-8,W-8,H-22]]
        .forEach(([x1,y1,x2,y2]) => doc.line(x1,y1,x2,y2));
      doc.setFont("helvetica","bold"); doc.setFontSize(26);
      doc.setTextColor(ar,ag,ab);
      doc.text("ZENNIVA", W/2, H/2-12, {align:"center", charSpace:7});
      doc.setLineWidth(0.5); doc.line(W/2-22, H/2-5, W/2+22, H/2-5);
      doc.setFont("helvetica","normal"); doc.setFontSize(8);
      doc.text(settings.subtitle.toUpperCase(), W/2, H/2+3, {align:"center", charSpace:2});
      doc.setFontSize(7.5); doc.setTextColor(160,150,135);
      doc.text(settings.contactInfo, W/2, H-20, {align:"center"});

      const filename = "Zenniva-Katalog-"+settings.year+".pdf";
      doc.save(filename);
      alert("✅ PDF indirildi: "+filename);

    } catch(err) {
      console.error("PDF hatası:", err);
      alert("PDF hatası: " + (err.message || String(err)));
    }
    setPdfLoading(false);
  };

  const catColors = {"Oturma Odası":"#b8935a","Yemek Odası":"#4a7ab0","Yatak Odası":"#7a5ab0","Salon":"#3a9a5a","Çalışma Odası":"#c04040","Diğer":"#a09080"};
  const fmt = n => n > 0 ? new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(n) : "";

  return (
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:300,color:"#7a5030"}}>PDF Katalog</div>
          <div style={{fontSize:11,color:"#b0a090",marginTop:2}}>{katalogItems.length} ürün · Fotoğraf yükle, AI analiz eder, profesyonel PDF</div>
        </div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
          {mode!=="list" && <button className="bg" onClick={()=>{setMode("list");setEditId(null);setBatchQueue([]);setNewItem({name:"",category:"",description:"",price:"",unit:"Adet",imageData:null,imageName:""});}}>← Geri</button>}
          {mode==="list" && <>
            <button className="bg" onClick={()=>setMode("settings")}>⚙ Ayarlar</button>
            <button className="bg" onClick={()=>setMode("addItem")}>📸 Tekli Ekle</button>
            <button className="bg" onClick={()=>setMode("batch")}>📦 Toplu Ekle</button>
            <button className="bp" onClick={generateKatalogPDF} style={{opacity:pdfLoading||katalogItems.length===0?.5:1}} disabled={pdfLoading||katalogItems.length===0}>
              {pdfLoading ? "⏳ Oluşturuluyor..." : `📥 PDF İndir ${katalogItems.length>0?"("+katalogItems.length+" ürün)":""}`}
            </button>
          </>}
          {mode==="addItem" && <button className="bp" onClick={saveItem}>💾 Kaydet</button>}
          {mode==="batch" && batchQueue.length>0 && !batchProcessing && <button className="bp" onClick={saveBatch}>✅ Seçilenleri Ekle ({batchQueue.filter(i=>i.selected&&i.imageData).length})</button>}
          {mode==="settings" && <button className="bp" onClick={saveSettings}>💾 Kaydet</button>}
        </div>
      </div>

      {/* Stats - list mode only */}
      {mode==="list" && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
          {[
            ["Toplam Ürün", katalogItems.length, "#a09080"],
            ["Kategoriler", [...new Set(katalogItems.map(i=>i.category).filter(Boolean))].length, "#b8935a"],
            ["Fiyatlı", katalogItems.filter(i=>i.price>0).length, "#3a9a5a"],
            ["Durum", katalogItems.length>0?"Hazır":"Boş", katalogItems.length>0?"#3a9a5a":"#c04040"],
          ].map(([l,v,c])=>(
            <div key={l} style={{background:"#fff",border:"1px solid #e8e2d8",borderRadius:9,padding:"14px 16px"}}>
              <div style={{fontSize:9.5,color:"#b0a090",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{l}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:typeof v==="number"?26:16,color:c}}>{v}</div>
            </div>
          ))}
        </div>
      )}

      {/* SINGLE ADD */}
      {mode==="addItem" && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div>
            <div className="card" style={{marginBottom:12}}>
              <span className="lbl" style={{marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>

];
const HAT_CATS = ["Ödeme","Sözleşme","Muhasebe","Operasyon","Pazarlama","Müşteri","Toplantı","Diğer"];

function HatirlaticiModule({store}) {
  const [list, setList] = useState(()=>store.get("znn_hatirlatici")||[]);
  const [form, setForm] = useState({title:"",desc:"",date:"",time:"09:00",priority:"Orta",category:"Diğer",done:false,repeat:"Tekrarsız"});
  const [showNew, setShowNew] = useState(false);
  const [filter, setFilter] = useState("Tümü");
  const [view, setView] = useState("list");

  const save = () => {
    const nh = {...form, id:Date.now()};
    const u = [...list, nh]; setList(u); store.set("znn_hatirlatici", u);
    setShowNew(false); setForm({title:"",desc:"",date:"",time:"09:00",priority:"Orta",category:"Diğer",done:false,repeat:"Tekrarsız"});
  };
  const toggle = id => { const u=list.map(h=>h.id===id?{...h,done:!h.done}:h); setList(u); store.set("znn_hatirlatici",u); };
  const remove = id => { const u=list.filter(h=>h.id!==id); setList(u); store.set("znn_hatirlatici",u); };
  const prioColor = p => p==="Yüksek"?"#c04040":p==="Orta"?"#b8935a":"#3a9a5a";
  const today = new Date().toISOString().split("T")[0];
  const isOverdue = h => !h.done && h.date < today;
  const isToday = h => h.date === today;

  const filtered = list.filter(h => {
    if (filter==="Bugün") return isToday(h) && !h.done;
    if (filter==="Gecikmiş") return isOverdue(h);
    if (filter==="Tamamlanan") return h.done;
    if (filter==="Bekleyen") return !h.done;
    if (HAT_CATS.includes(filter)) return h.category===filter;
    return true;
  }).sort((a,b)=>a.done-b.done||a.date.localeCompare(b.date));

  const todayCount = list.filter(h=>isToday(h)&&!h.done).length;
  const overdueCount = list.filter(h=>isOverdue(h)).length;
  const pendingCount = list.filter(h=>!h.done).length;

  // AI suggestions
  const [aiLoading, setAiLoading] = useState(false);
  const [aiSuggestions, setAiSuggestions] = useState([]);
  const getAiSuggestions = async () => {
    setAiLoading(true);
    const context = `Zenniva mobilya şirketi. Bekleyen hatırlatıcılar: ${list.filter(h=>!h.done).map(h=>h.title).join(", ")}. Bugünün tarihi: ${today}. Bu hafta için 3 önemli iş görevi öner.`;
    try {
      const resp = await anthropicFetch({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:context}]});
      const data = await resp.json();
      const text = data.content?.[0]?.text || "";
      const lines = text.split("\n").filter(l=>l.trim()&&l.match(/^[\d•\-]/)).slice(0,3);
      setAiSuggestions(lines.map(l=>l.replace(/^[\d\.\-•\s]+/,"").trim()));
    } catch(e) { setAiSuggestions(["Bağlantı hatası"]); }
    setAiLoading(false);
  };

  const catColors3 = {"Ödeme":"#c04040","Sözleşme":"#7a5ab0","Muhasebe":"#4a7ab0","Operasyon":"#3a8a9a","Pazarlama":"#e09060","Müşteri":"#3a9a5a","Toplantı":"#b8935a","Diğer":"#a09080"};

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:300,color:"#7a5030"}}>Hatırlatıcılar</div>
        <div style={{display:"flex",gap:8}}>
          <button className="bg" style={{fontSize:11}} onClick={getAiSuggestions} disabled={aiLoading}>{aiLoading?"🤖...":"🤖 AI Öneri"}</button>
          <button className={showNew?"bg":"bp"} onClick={()=>setShowNew(s=>!s)}>{showNew?"İptal":"+ Hatırlatıcı Ekle"}</button>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
        {[["Bekleyen",pendingCount,"#a09080"],["Bugün",todayCount,"#4a7ab0"],["Gecikmiş",overdueCount,"#c04040"],["Tamamlanan",list.filter(h=>h.done).length,"#3a9a5a"]].map(([l,v,c])=>(
          <div key={l} onClick={()=>setFilter(l==="Bekleyen"?"Bekleyen":l==="Bugün"?"Bugün":l==="Gecikmiş"?"Gecikmiş":"Tamamlanan")} style={{background:"#fff",border:`1px solid ${filter===l||filter===l?"#e8e2d8":"#e8e2d8"}`,borderRadius:9,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,.04)",cursor:"pointer"}}>
            <div style={{fontSize:9.5,color:"#b0a090",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{l}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:c}}>{v}</div>
          </div>
        ))}
      </div>

      {aiSuggestions.length>0 && (
        <div style={{background:"linear-gradient(135deg,rgba(184,147,90,.06),rgba(184,147,90,.02))",border:"1px solid rgba(184,147,90,.2)",borderRadius:10,padding:"14px 16px",marginBottom:14}}>
          <div style={{fontSize:10.5,color:"#b8935a",fontWeight:600,marginBottom:8,letterSpacing:1}}>🤖 AI ÖNERİLERİ</div>
          {aiSuggestions.map((s,i)=>(
            <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
              <span style={{color:"#b8935a",fontSize:11,fontWeight:700,flexShrink:0}}>#{i+1}</span>
              <span style={{fontSize:12.5,color:"#6b5d4f",flex:1}}>{s}</span>
              <button className="bp" style={{fontSize:9.5,padding:"2px 9px",flexShrink:0}} onClick={()=>{setForm(p=>({...p,title:s,date:today}));setShowNew(true);}}>+ Ekle</button>
            </div>
          ))}
          <button className="bg" style={{fontSize:10,marginTop:4}} onClick={()=>setAiSuggestions([])}>Kapat</button>
        </div>
      )}

      {showNew && (
        <div className="card" style={{marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>

  );
}

function SBSettingsPanel({store}) {
  const [cfg, setCfg] = React.useState(()=>{
    try{return JSON.parse(localStorage.getItem("znn_sb_config")||'{"url":"","key":""}');}catch{return {url:"",key:""};}
  });
  const [status, setStatus] = React.useState("idle"); // idle|testing|ok|error
  const [syncStatus, setSyncStatus] = React.useState("");
  const [showKey, setShowKey] = React.useState(false);
  const connected = !!(cfg.url && cfg.key);

  const save = () => {
    localStorage.setItem("znn_sb_config", JSON.stringify(cfg));
    setStatus("idle");
    setSyncStatus("✅ Bağlantı bilgileri kaydedildi.");
  };

  const test = async () => {
    if(!cfg.url || !cfg.key) { setStatus("error"); return; }
    setStatus("testing");
    try {
      const r = await fetch(cfg.url+"/rest/v1/znn_settings?limit=1", {
        headers:{"apikey":cfg.key,"Authorization":"Bearer "+cfg.key}
      });
      if(r.ok || r.status===406) { setStatus("ok"); }
      else { setStatus("error"); }
    } catch { setStatus("error"); }
  };

  const syncNow = async () => {
    setSyncStatus("⏳ Senkronize ediliyor...");
    const ok = await store.syncAll();
    setSyncStatus(ok ? "✅ Tüm veriler Supabase'den yüklendi!" : "❌ Bağlantı hatası.");
  };

    setSyncStatus("⏳ Yerel veriler Supabase'e yükleniyor...");

    for(const k of keys) {
      const data = store.get(k);
      if(data) await store._syncToSB(k, data);

    setSyncStatus("✅ Yerel veriler Supabase'e aktarıldı!");

  return (

        <div style={{fontSize:28}}>{connected&&status==="ok"?"✅":connected?"🟡":"⚪"}</div>
        <div>
          <div style={{fontSize:13,fontWeight:500,color:connected&&status==="ok"?"#3a9a5a":connected?"#b8935a":"#8a7868"}}>

          <div style={{fontSize:11,color:"#a09080",marginTop:2}}>
            {connected?"Veriler hem cihazda hem Supabase'de saklanır":"Şu an yalnızca bu cihazda saklanıyor"}

        </div>

      {/* Setup Guide */}

<script>
// ─── SERVICE WORKER (offline cache) ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'zenniva-v1';
const ASSETS = [
  'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js',
];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).catch(()=>{}));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('anthropic.com')) return;
  e.respondWith(
    caches.match(e.request).then(cached => cached || fetch(e.request).then(resp => {
      if (resp && resp.status === 200 && e.request.method === 'GET') {
        const clone = resp.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
      }
      return resp;
    }).catch(() => cached))
  );
});
`;
  const blob = new Blob([swCode], {type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob))
    .then(() => console.log('Zenniva SW registered'))
    .catch(e => console.log('SW error:', e));
}

// ─── PWA INSTALL PROMPT ───────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install banner after 3 seconds
  setTimeout(() => {
    if (deferredPrompt) showInstallBanner();
  }, 3000);
});

function showInstallBanner() {
  if (document.getElementById('install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.innerHTML = `
    <div style="position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1c2b3a;color:#fff;border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.35);z-index:9999;max-width:340px;width:calc(100% - 32px)">
      <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#b8935a,#7a5030);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">Z</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;margin-bottom:2px">Ana Ekrana Ekle</div>
        <div style="font-size:11px;opacity:.7">Zenniva'yı uygulama olarak kullan</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button onclick="installApp()" style="background:#b8935a;color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer">Ekle</button>
        <button onclick="document.getElementById('install-banner').remove();deferredPrompt=null" style="background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:8px;padding:7px 10px;font-size:12px;cursor:pointer">✕</button>
      </div>
    </div>`;
  document.body.appendChild(banner);
  setTimeout(() => { if (document.getElementById('install-banner')) document.getElementById('install-banner').remove(); }, 12000);
}

window.installApp = async function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner')?.remove();
};

// iOS Safari install guide
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone === true;
if (isIOS && !isStandalone) {
  setTimeout(() => {
    const banner = document.createElement('div');
    banner.id = 'ios-banner';
    banner.innerHTML = `
      <div style="position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1c2b3a;color:#fff;border-radius:14px;padding:16px 18px;box-shadow:0 8px 32px rgba(0,0,0,.35);z-index:9999;max-width:320px;width:calc(100% - 32px);text-align:center">
        <div style="font-size:22px;margin-bottom:8px">Z</div>
        <div style="font-size:13px;font-weight:600;margin-bottom:6px">Zenniva'yı Ana Ekrana Ekle</div>
        <div style="font-size:11.5px;opacity:.8;line-height:1.6">Safari'de <strong>paylaş</strong> butonuna (↑) dokunun, ardından <strong>"Ana Ekrana Ekle"</strong>'yi seçin.</div>
        <button onclick="document.getElementById('ios-banner').remove()" style="margin-top:12px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:7px 20px;font-size:12px;cursor:pointer">Tamam</button>
      </div>`;
    document.body.appendChild(banner);
    setTimeout(() => document.getElementById('ios-banner')?.remove(), 15000);
  }, 4000);
}

// Prevent double-tap zoom on mobile
document.addEventListener('dblclick', e => e.preventDefault(), {passive: false});
// Prevent pull-to-refresh
document.body.addEventListener('touchmove', function(e) {

<script type="text/babel">
// ─── EMAIL MODAL ──────────────────────────────────────────────────────────────
function EmailModal({onClose, defaultTo="", defaultSubject="", defaultMessage=""}) {
  const [form, setForm] = React.useState({to:defaultTo, subject:defaultSubject, message:defaultMessage});
  const [status, setStatus] = React.useState("idle"); // idle|sending|ok|error

  const send = async () => {
    if (!form.to || !form.subject || !form.message) { alert("Tüm alanları doldurun!"); return; }
    setStatus("sending");
    try {
      await sendEmail({to:form.to, subject:form.subject, message:form.message});
      setStatus("ok");
      setTimeout(()=>onClose(), 1500);
    } catch(e) {
      setStatus("error");
      console.error(e);
    }
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:14,padding:28,width:"100%",maxWidth:480,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,color:"#7a5030"}}>✉️ E-posta Gönder</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#a09080"}}>✕</button>
        </div>
        <div style={{marginBottom:10}}>
          <span className="lbl">Alıcı E-posta</span>
          <input className="inp" value={form.to} onChange={e=>setForm(p=>({...p,to:e.target.value}))} placeholder="<a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="d4bba6bab1bf94b1b9b5bdb8fab7bbb9">[email&#160;protected]</a>"/>
        </div>
        <div style={{marginBottom:10}}>
          <span className="lbl">Konu</span>
          <input className="inp" value={form.subject} onChange={e=>setForm(p=>({...p,subject:e.target.value}))} placeholder="E-posta konusu"/>
        </div>
        <div style={{marginBottom:16}}>
          <span className="lbl">Mesaj</span>
          <textarea className="inp" value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))} rows={6} style={{resize:"vertical"}} placeholder="Mesajınızı yazın..."/>
        </div>
        {status==="ok" && <div style={{padding:"10px",background:"rgba(58,154,90,.1)",borderRadius:8,color:"#3a9a5a",marginBottom:12,textAlign:"center"}}>✅ E-posta gönderildi!</div>}
        {status==="error" && <div style={{padding:"10px",background:"rgba(192,64,64,.1)",borderRadius:8,color:"#c04040",marginBottom:12,textAlign:"center"}}>❌ Gönderilemedi. Ayarları kontrol edin.</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button className="bg" onClick={onClose}>İptal</button>
          <button className="bp" onClick={send} disabled={status==="sending"}>
            {status==="sending"?"⏳ Gönderiliyor...":status==="ok"?"✅ Gönderildi":"📤 Gönder"}
          </button>
        </div>
      </div>
    </div>
  );
}
</script>
